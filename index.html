<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopcare - Camera "Áo" Filter & Bố Cục</title>
    <style>
        /* Phong cách tổng thể như hình ảnh */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Open Sans', Arial, sans-serif; }
        
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Tiêu đề "ÁO FILTER ACTIVATED" */
        .status-header { position: absolute; top: 10px; width: 100%; text-align: center; color: #ff007f; font-weight: bold; font-size: 16px; font-family: 'Open Sans', sans-serif; text-transform: uppercase; z-index: 10; text-shadow: 0 0 5px #ff007f; }

        /* Lớp nền hiển thị lưới bố cục trên màn hình */
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        .active { display: block; }
        .line { position: absolute; background-color: rgba(255, 255, 255, 0.5); box-shadow: 0 0 3px rgba(0,0,0,0.6); }

        /* Bối cảnh "Áo": Tái tạo màu sắc gradients như hình */
        .ao-gradient {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(135, 206, 235, 0.4) 0%, rgba(255, 182, 193, 0.4) 50%, rgba(135, 206, 235, 0.4) 100%);
            mix-blend-mode: color;
            pointer-events: none;
        }

        /* 1. Lưới xoắn ốc (Bố cục xoắn ốc) */
        .spiral-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* 2. Bố cục 1/3 Grid */
        .grid-v1, .grid-v2 { width: 1px; height: 100%; top: 0; } .grid-v1 { left: 33.33%; } .grid-v2 { left: 66.66%; }
        .grid-h1, .grid-h2 { height: 1px; width: 100%; left: 0; } .grid-h1 { top: 33.33%; } .grid-h2 { top: 66.66%; }
        /* 3. Bố cục Khung hình */
        .frame-box { position: absolute; top: 15%; left: 10%; width: 80%; height: 55%; border: 2px solid rgba(255, 255, 255, 0.6); }
        /* 4. Bố cục Tam giác */
        .triangle-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* 5. Tâm vàng (Center Target) */
        .center-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; border: 2.5px dotted #ffeb3b; border-radius: 50%; }

        /* Panel điều khiển phía dưới */
        .controls-panel { position: absolute; bottom: 0; width: 100%; height: 110px; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding-bottom: 10px; z-index: 10; }
        
        /* Menu bấm chuyển đổi bố cục */
        .mode-selector { width: 100%; display: flex; justify-content: center; gap: 8px; overflow-x: auto; padding: 5px 10px; }
        .mode-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .mode-btn.selected { background: #ffeb3b; color: #000; font-weight: bold; }

        /* Tiêu đề BỐ CỤC CHUẨN và Nút chụp */
        .action-area { width: 100%; display: flex; justify-content: space-around; align-items: center; }
        .footer-text { color: #ffeb3b; font-weight: bold; font-size: 14px; font-family: 'Open Sans', sans-serif; text-transform: uppercase; }
        .shutter-btn { width: 55px; height: 55px; border-radius: 50%; background-color: #fff; border: 4px solid rgba(255, 255, 255, 0.3); cursor: pointer; }

        /* KHU VỰC HIỂN THỊ ẢNH SAU KHI CHỤP VÀ ĐÃ XỬ LÝ MÀU ÁO */
        .preview-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20; justify-content: center; align-items: center; flex-direction: column; }
        #capturedImage { max-width: 90%; max-height: 75%; border: 2px solid #fff; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .preview-tip { color: #ffeb3b; margin-top: 15px; font-size: 14px; text-align: center; font-weight: bold; }
        .close-btn { margin-top: 15px; background: #fff; color: #000; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>

        <div class="ao-gradient"></div>

        <div class="status-header">ÁO FILTER ACTIVATED</div>

        <div id="layout-spiral" class="overlay-layer active">
            <svg class="spiral-svg" viewBox="0 0 1000 1000">
                <path d="M500,500 m -300, 0 a 300,300 0 1,0 600,0 a 300,300 0 1,0 -600,0 M500,500 m -220, 0 a 220,220 0 1,0 440,0 a 220,220 0 1,0 -440,0 M500,500 m -140, 0 a 140,140 0 1,0 280,0 a 140,140 0 1,0 -280,0 M500,500 m -60, 0 a 60,60 0 1,0 120,0 a 60,60 0 1,0 -120,0" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
            </svg>
        </div>

        <div id="layout-grid" class="overlay-layer">
            <div class="line grid-v1"></div><div class="line grid-v2"></div>
            <div class="line grid-h1"></div><div class="line grid-h2"></div>
        </div>

        <div id="layout-framing" class="overlay-layer">
            <div class="frame-box"></div>
        </div>

        <div id="layout-triangle" class="overlay-layer">
            <svg class="triangle-svg">
                <polygon points="50%,15% 0%,50% 100%,50%" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
            </svg>
        </div>

        <div id="layout-center" class="overlay-layer">
            <div class="center-dot"></div>
        </div>

        <div class="controls-panel">
            <div class="mode-selector">
                <button class="mode-btn selected" onclick="changeLayout('spiral', this)">Ốc Sên</button>
                <button class="mode-btn" onclick="changeLayout('grid', this)">1/3 Grid</button>
                <button class="mode-btn" onclick="changeLayout('framing', this)">Khung</button>
                <button class="mode-btn" onclick="changeLayout('triangle', this)">Tam Giác</button>
                <button class="mode-btn" onclick="changeLayout('center', this)">Tâm Vàng</button>
            </div>
            <div class="action-area">
                <div class="footer-text">BỐ CỤC CHUẨN</div>
                <button class="shutter-btn" onclick="takePhoto()"></button>
            </div>
        </div>
    </div>

    <div id="previewContainer" class="preview-container">
        <img id="capturedImage" alt="Ảnh đã căn bố cục và chỉnh màu ÁO tự động">
        <p class="preview-tip">📸 ĐÃ CĂN BỐ CỤC & TỰ ĐỘNG CHỈNH MÀU ÁO 📸<br>👉 Ấn giữ im vào ảnh 2 giây để Lưu nha!</p>
        <button class="close-btn" onclick="closePreview()">Chụp tiếp</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const previewContainer = document.getElementById('previewContainer');
        const capturedImage = document.getElementById('capturedImage');

        // Khởi động Camera sau của máy
        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false }).then(stream => { video.srcObject = stream; });
            }
        }

        // Thay đổi qua lại giữa các đường lưới căn chỉnh bố cục
        function changeLayout(layoutName, btnElement) {
            document.querySelectorAll('.overlay-layer').forEach(layer => layer.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`layout-${layoutName}`).classList.add('active');
            btnElement.classList.add('selected');
        }

        // CHỤP VÀ ÉP FILTER CHỈNH MÀU ÁO TỰ ĐỘNG
        function takePhoto() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // ÉP FILTER MÀU ÁO: Nâng độ tươi, tương phản và Gradients "Áo"
            ctx.filter = "contrast(112%) saturate(135%) brightness(105%)";
            
            // Đóng băng luồng hình ảnh từ camera đưa lên canvas ngầm
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Thêm Gradient màu Áo thực tế lên ảnh (Blend Mode 'Overlay')
            ctx.globalCompositeOperation = 'overlay';
            let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, "rgba(135, 206, 235, 0.2)");
            gradient.addColorStop(0.5, "rgba(255, 182, 193, 0.2)");
            gradient.addColorStop(1, "rgba(135, 206, 235, 0.2)");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Reset filters
            ctx.globalCompositeOperation = 'source-over';
            ctx.filter = "none";
            
            // Đổ hình ảnh thành phẩm sang ô xem trước để lưu
            capturedImage.src = canvas.toDataURL('image/png');
            previewContainer.style.display = 'flex';
        }

        function closePreview() {
            previewContainer.style.display = 'none';
        }

        window.addEventListener('DOMContentLoaded', initCam);
    </script>
</body>
</html>
