<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopcare - Professional Camera Stream</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0c0c0c; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Giao diện tối giản chuẩn Leica/Fujifilm */
        .status-header { position: absolute; top: 15px; width: 100%; text-align: center; color: #ffffff; font-weight: 600; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; z-index: 10; opacity: 0.9; }
        .sub-header { position: absolute; top: 35px; width: 100%; text-align: center; color: #aaa; font-weight: normal; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; z-index: 10; }

        /* Lớp hiển thị lưới bố cục chuyên nghiệp */
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 3; }
        .active { display: block; }
        .line { position: absolute; background-color: rgba(255, 255, 255, 0.4); border-radius: 1px; }

        /* Các đường lưới mảnh tinh tế không làm rối mắt */
        .spiral-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.6; }
        .grid-v1, .grid-v2 { width: 1px; height: 100%; top: 0; } .grid-v1 { left: 33.33%; } .grid-v2 { left: 66.66%; }
        .grid-h1, .grid-h2 { height: 1px; width: 100%; left: 0; } .grid-h1 { top: 33.33%; } .grid-h2 { top: 66.66%; }
        .frame-outer { position: absolute; top: 12%; left: 10%; width: 80%; height: 60%; border: 1px solid rgba(255, 255, 255, 0.4); }
        .frame-inner { position: absolute; top: 72%; left: 45%; width: 10%; height: 12%; border: 1px solid rgba(255, 255, 255, 0.5); }
        .triangle-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.5; }

        /* Thanh điều khiển tối giản */
        .controls-panel { position: absolute; bottom: 0; width: 100%; height: 130px; background: rgba(12, 12, 12, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding-bottom: 12px; z-index: 10; border-top: 1px solid rgba(255,255,255,0.08); }
        .mode-selector { width: 100%; display: flex; justify-content: flex-start; gap: 8px; overflow-x: auto; padding: 6px 15px; scrollbar-width: none; }
        .mode-selector::-webkit-scrollbar { display: none; }
        .mode-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: #999; padding: 6px 14px; border-radius: 4px; font-size: 11px; cursor: pointer; text-transform: uppercase; white-space: nowrap; font-weight: 500; transition: all 0.2s; }
        .mode-btn.selected { background: #ffffff; color: #000000; font-weight: bold; border-color: #ffffff; }

        .action-area { width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; }
        .footer-text { color: #ffffff; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
        
        /* Nút chụp tối giản kiểu máy ảnh cơ */
        .shutter-btn { width: 60px; height: 60px; border-radius: 50%; background-color: #ffffff; border: 4px solid rgba(12, 12, 12, 0.8); box-shadow: 0 0 0 3px #ffffff; cursor: pointer; transition: transform 0.1s ease; }
        .shutter-btn:active { transform: scale(0.9); }

        /* MÀN HÌNH PREVIEW CHỌN FILTER PRO */
        .preview-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0c0c0c; z-index: 20; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px 0; }
        .preview-box { width: 100%; height: 56%; display: flex; justify-content: center; align-items: center; position: relative; background: #050505; }
        
        .image-wrapper { position: relative; max-width: 92%; max-height: 100%; display: flex; justify-content: center; align-items: center; border-radius: 8px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        #previewImage { width: 100%; height: 100%; object-fit: contain; }
        .gradient-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* Thanh cuộn 10 bộ lọc chuyên nghiệp */
        .filter-bar { width: 100%; display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: #121212; border-top: 1px solid #1e1e1e; border-bottom: 1px solid #1e1e1e; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-item { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 78px; cursor: pointer; }
        .filter-thumb { width: 54px; height: 54px; border-radius: 4px; border: 1px solid #2a2a2a; overflow: hidden; transition: all 0.2s; background: #222; }
        .filter-item.active .filter-thumb { border-color: #ffffff; box-shadow: 0 0 8px rgba(255,255,255,0.5); }
        .filter-name { color: #666; font-size: 10px; text-align: center; white-space: nowrap; font-weight: 500; }
        .filter-item.active .filter-name { color: #ffffff; font-weight: bold; }

        /* Nút tác vụ dưới màn hình Preview */
        .bottom-actions { width: 100%; display: flex; justify-content: center; gap: 15px; padding: 5px 20px; }
        .action-btn { padding: 12px 28px; border-radius: 4px; font-weight: 600; font-size: 12px; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-cancel { background: #222; color: #aaa; border: 1px solid #333; }
        .btn-download { background: #ffffff; color: #000000; }

        .loading-toast { display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); color: #fff; padding: 12px 24px; border-radius: 4px; font-size: 12px; z-index: 40; border: 1px solid #333; letter-spacing: 1px; text-align: center; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="camera-container" id="cameraView">
        <video id="video" autoplay playsinline></video>
        <div class="status-header">SOPCARE PRO</div>
        <div class="sub-header">PRO-FILTERS MODE</div>

        <div id="layout-spiral" class="overlay-layer active">
            <svg class="spiral-svg" viewBox="0 0 1000 1000">
                <path d="M500,500 m -300, 0 a 300,300 0 1,0 600,0 a 300,300 0 1,0 -600,0 M500,500 m -220, 0 a 220,220 0 1,0 440,0 a 220,220 0 1,0 -440,0 M500,500 m -140, 0 a 140,140 0 1,0 280,0 a 140,140 0 1,0 -280,0 M500,500 m -60, 0 a 60,60 0 1,0 120,0 a 60,60 0 1,0 -120,0" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
            </svg>
        </div>
        <div id="layout-grid" class="overlay-layer"><div class="line grid-v1"></div><div class="line grid-v2"></div><div class="line grid-h1"></div><div class="line grid-h2"></div></div>
        <div id="layout-framing" class="overlay-layer"><div class="frame-outer"></div><div class="frame-inner"></div></div>
        <div id="layout-triangle" class="overlay-layer">
            <svg class="triangle-svg"><polygon points="50%,32% 10%,75% 90%,75%" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/></svg>
        </div>

        <div class="controls-panel">
            <div class="mode-selector">
                <button class="mode-btn selected" onclick="changeLayout('spiral', this)">Ốc Sên</button>
                <button class="mode-btn" onclick="changeLayout('grid', this)">Lưới 1/3</button>
                <button class="mode-btn" onclick="changeLayout('framing', this)">Khung Ảnh</button>
                <button class="mode-btn" onclick="changeLayout('triangle', this)">Tam Giác</button>
            </div>
            <div class="action-area">
                <div class="footer-text">RAW CAPTURE</div>
                <button class="shutter-btn" onclick="takePhoto()"></button>
            </div>
        </div>
    </div>

    <div class="preview-container" id="previewView">
        <div class="status-header">DEVELOPING DIALOG</div>
        
        <div class="preview-box">
            <div class="image-wrapper">
                <img id="previewImage" alt="Preview">
                <div class="gradient-overlay" id="gradientOverlay"></div>
            </div>
        </div>

        <div class="filter-bar" id="filterBar"></div>

        <div class="bottom-actions">
            <button class="action-btn btn-cancel" onclick="cancelPreview()">Chụp lại</button>
            <button class="action-btn btn-download" onclick="downloadFinalImage()">Xuất Ảnh (Save)</button>
        </div>
    </div>

    <div id="loadingToast" class="loading-toast">PROCESSING IMAGES...</div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cameraView = document.getElementById('cameraView');
        const previewView = document.getElementById('previewView');
        const previewImage = document.getElementById('previewImage');
        const gradientOverlay = document.getElementById('gradientOverlay');
        const filterBar = document.getElementById('filterBar');
        const loadingToast = document.getElementById('loadingToast');

        let originalImageDataUrl = '';
        let selectedFilterId = 'normal';

        // 10 BỘ LỌC CHUẨN MÁY ẢNH CHUYÊN NGHIỆP CAO CẤP
        const filtersConfig = [
            { id: 'normal', name: 'ORIGINAL', filterCSS: 'none', blend: 'none', gradStyle: '' },
            { id: 'fuji-classic', name: '🎞 Fuji Chrome', filterCSS: 'contrast(106%) saturate(112%) brightness(98%) sepia(4%)', blend: 'multiply', gradStyle: 'linear-gradient(to bottom, rgba(0,30,10,0.03), rgba(20,10,0,0.02))' },
            { id: 'leica-mood', name: '🔴 Leica M', filterCSS: 'contrast(122%) saturate(94%) brightness(96%)', blend: 'none', gradStyle: '' },
            { id: 'vsco-clean', name: '✨ Trong Trẻo', filterCSS: 'brightness(105%) contrast(102%) saturate(108%)', blend: 'none', gradStyle: '' },
            { id: 'fuji-c200', name: '🍃 Fuji C200', filterCSS: 'contrast(98%) saturate(125%) hue-rotate(6deg) brightness(101%)', blend: 'none', gradStyle: '' },
            { id: 'warm-portrait', name: '📸 Portrait Tone', filterCSS: 'brightness(103%) contrast(96%) saturate(104%) sepia(8%)', blend: 'soft-light', gradStyle: 'linear-gradient(rgba(255,200,150,0.08), transparent)' },
            { id: 'vintage-gold', name: '🍂 Vintage Gold', filterCSS: 'contrast(95%) sepia(28%) saturate(105%) brightness(98%)', blend: 'none', gradStyle: '' },
            { id: 'kodak-portra', name: '🎞 Portra 400', filterCSS: 'contrast(104%) saturate(110%) brightness(102%) hue-rotate(-3deg)', blend: 'none', gradStyle: '' },
            { id: 'urban-cool', name: '🏙 Urban Cool', filterCSS: 'contrast(114%) saturate(95%) hue-rotate(-8deg) brightness(97%)', blend: 'overlay', gradStyle: 'linear-gradient(rgba(0,100,255,0.05), transparent)' },
            { id: 'leica-bw', name: '🖤 Leica B&W', filterCSS: 'grayscale(100%) contrast(135%) brightness(94%)', blend: 'none', gradStyle: '' }
        ];

        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false }).then(stream => { video.srcObject = stream; });
            }
        }

        function changeLayout(layoutName, btnElement) {
            document.querySelectorAll('.overlay-layer').forEach(layer => layer.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`layout-${layoutName}`).classList.add('active');
            btnElement.classList.add('selected');
        }

        function renderFilterBar() {
            filterBar.innerHTML = '';
            filtersConfig.forEach(f => {
                const item = document.createElement('div');
                item.className = `filter-item ${f.id === selectedFilterId ? 'active' : ''}`;
                item.onclick = () => selectFilter(f.id);

                let thumbStyle = `filter: ${f.filterCSS};`;
                if(f.gradStyle) {
                    thumbStyle += `background: ${f.gradStyle};`;
                } else {
                    thumbStyle += `background: #252525;`;
                }

                item.innerHTML = `
                    <div class="filter-thumb" style="${thumbStyle}"></div>
                    <div class="filter-name">${f.name}</div>
                `;
                filterBar.appendChild(item);
            });
        }

        function selectFilter(filterId) {
            selectedFilterId = filterId;
            const targetFilter = filtersConfig.find(f => f.id === filterId);
            
            previewImage.style.filter = targetFilter.filterCSS;
            
            if(targetFilter.gradStyle) {
                gradientOverlay.style.background = targetFilter.gradStyle;
                gradientOverlay.style.mixBlendMode = targetFilter.blend;
            } else {
                gradientOverlay.style.background = 'none';
            }

            renderFilterBar();
        }

        function takePhoto() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            originalImageDataUrl = canvas.toDataURL('image/png');
            
            previewImage.src = originalImageDataUrl;
            cameraView.style.display = 'none';
            previewView.style.display = 'flex';
            
            selectFilter('normal');
        }

        function cancelPreview() {
            previewView.style.display = 'none';
            cameraView.style.display = 'flex';
        }

        function downloadFinalImage() {
            loadingToast.style.display = 'block';
            
            const imgElement = new Image();
            imgElement.src = originalImageDataUrl;
            
            imgElement.onload = function() {
                const ctx = canvas.getContext('2d');
                canvas.width = imgElement.width;
                canvas.height = imgElement.height;
                
                const currentFilter = filtersConfig.find(f => f.id === selectedFilterId);
                
                ctx.filter = currentFilter.filterCSS;
                ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
                
                if(currentFilter.gradStyle) {
                    ctx.globalCompositeOperation = currentFilter.blend === 'none' ? 'source-over' : currentFilter.blend;
                    let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    
                    if(currentFilter.id === 'fuji-classic') {
                        gradient.addColorStop(0, "rgba(0,30,10,0.03)");
                        gradient.addColorStop(1, "rgba(20,10,0,0.02)");
                    } else if(currentFilter.id === 'warm-portrait') {
                        gradient.addColorStop(0, "rgba(255,200,150,0.08)");
                        gradient.addColorStop(1, "transparent");
                    } else if(currentFilter.id === 'urban-cool') {
                        gradient.addColorStop(0, "rgba(0,100,255,0.05)");
                        gradient.addColorStop(1, "transparent");
                    }
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                
                ctx.globalCompositeOperation = 'source-over';
                ctx.filter = "none";
                
                canvas.toBlob(function(blob) {
                    const fileUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = fileUrl;
                    link.download = `Sopcare_Pro_${currentFilter.id}_${new Date().getTime()}.png`;
                    document.body.appendChild(link);
                    link.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(link);
                        URL.revokeObjectURL(fileUrl);
                        loadingToast.style.display = 'none';
                    }, 500);
                }, 'image/png', 1.0);
            };
        }

        window.addEventListener('DOMContentLoaded', () => {
            initCam();
            renderFilterBar();
        });
    </script>
</body>
</html>
