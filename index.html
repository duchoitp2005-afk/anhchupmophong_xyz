<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopcare - AI Anime Camera</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', Arial, sans-serif; }
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .status-header { position: absolute; top: 15px; width: 100%; text-align: center; color: #fff; font-weight: 900; font-size: 15px; letter-spacing: 1px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00ff; }
        .sub-header { position: absolute; top: 38px; width: 100%; text-align: center; color: #ffeb3b; font-weight: bold; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 5px #ffeb3b; }
        .flip-btn { position: absolute; top: 20px; right: 20px; width: 42px; height: 42px; background: rgba(0,0,0,0.7); border: 1px solid #00ffff; border-radius: 50%; z-index: 12; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; box-shadow: 0 0 10px rgba(0,255,255,0.3); }
        
        /* Hệ thống lưới căn góc */
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 3; }
        .active { display: block; }
        .line { position: absolute; background-color: rgba(255, 255, 255, 0.4); box-shadow: 0 0 2px #000; }
        .spiral-svg, .triangle-svg, .diagonal-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .grid-v1, .grid-v2 { width: 1.5px; height: 100%; top: 0; } .grid-v1 { left: 33.33%; } .grid-v2 { left: 66.66%; }
        .grid-h1, .grid-h2 { height: 1.5px; width: 100%; left: 0; } .grid-h1 { top: 33.33%; } .grid-h2 { top: 66.66%; }
        .frame-outer { position: absolute; top: 15%; left: 10%; width: 80%; height: 55%; border: 1.5px solid rgba(255, 255, 255, 0.5); }
        .frame-inner { position: absolute; top: 70%; left: 44%; width: 12%; height: 15%; border: 1.5px solid rgba(255, 255, 255, 0.6); }
        .double-v1, .double-v2 { width: 1.5px; height: 100%; top: 0; } .double-v1 { left: 45%; } .double-v2 { left: 55%; }

        /* Panel điều khiển bên dưới */
        .controls-panel { position: absolute; bottom: 0; width: 100%; height: 145px; background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.8)); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding-bottom: 12px; z-index: 10; }
        .mode-selector { width: 100%; display: flex; justify-content: flex-start; gap: 8px; overflow-x: auto; padding: 6px 15px; scrollbar-width: none; }
        .mode-selector::-webkit-scrollbar { display: none; }
        .mode-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: #ccc; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; text-transform: uppercase; white-space: nowrap; font-weight: bold; }
        .mode-btn.selected { background: #00ffff; color: #000; font-weight: 900; border-color: #00ffff; box-shadow: 0 0 10px rgba(0,255,255,0.5); }
        
        /* Khu vực 2 nút chụp: Thường và AI */
        .action-area { width: 100%; display: flex; justify-content: center; align-items: center; gap: 40px; padding: 0 20px; }
        .shutter-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .shutter-label { color: #aaa; font-size: 9px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .shutter-btn { width: 55px; height: 55px; border-radius: 50%; background-color: #fff; border: 4px solid #222; cursor: pointer; box-shadow: 0 0 0 2px #fff; }
        .shutter-btn.ai-mode { background: linear-gradient(45deg, #00ffff, #ff00ff); border: 4px solid #111; box-shadow: 0 0 15px #ff00ff; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 10px #ff00ff; } 50% { transform: scale(1.05); box-shadow: 0 0 20px #00ffff; } 100% { transform: scale(1); box-shadow: 0 0 10px #ff00ff; } }

        /* Giao diện xem trước kết quả */
        .preview-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #020202; z-index: 20; flex-direction: column; justify-content: space-between; align-items: center; padding: 15px 0; }
        .preview-box { width: 100%; height: 52%; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; background: #090909; }
        .image-wrapper { position: relative; max-width: 90%; max-height: 100%; display: flex; justify-content: center; align-items: center; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        #previewImage { width: 100%; height: 100%; object-fit: contain; }
        .gradient-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; mix-blend-mode: overlay; }

        .filter-bar { width: 100%; display: flex; gap: 10px; overflow-x: auto; padding: 10px; background: #0c0c0c; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-item { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 70px; cursor: pointer; }
        .filter-thumb { width: 48px; height: 48px; border-radius: 8px; border: 2px solid #252525; background: #151515; }
        .filter-item.active .filter-thumb { border-color: #ffeb3b; box-shadow: 0 0 10px #ffeb3b; }
        .filter-name { color: #777; font-size: 9px; text-align: center; white-space: nowrap; font-weight: bold; text-transform: uppercase; }
        .filter-item.active .filter-name { color: #ffeb3b; }

        .bottom-actions { width: 100%; display: flex; justify-content: center; gap: 12px; padding: 5px 15px; }
        .action-btn { padding: 10px 25px; border-radius: 20px; font-weight: 800; font-size: 12px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-cancel { background: #161616; color: #888; border: 1px solid #252525; }
        .btn-download { background: linear-gradient(90deg, #ff00ff, #ffeb3b); color: #000; }
        
        .loading-toast { display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); color: #ffeb3b; padding: 12px 25px; border-radius: 25px; font-weight: bold; font-size: 12px; z-index: 40; border: 1px solid #ffeb3b; text-align: center; }
        canvas { display: none; }
    </style>
</head>
    <body>
    <div class="camera-container" id="cameraView">
        <video id="video" autoplay playsinline></video>
        <div class="status-header">SOPCARE AI CAM</div>
        <div class="sub-header">INTELLIGENT FILTER SELECTION</div>
        <div class="flip-btn" onclick="toggleCamera()">🔄</div>

        <div id="layout-spiral" class="overlay-layer active"><svg class="spiral-svg" viewBox="0 0 1000 1000"><path d="M500,500 m -300, 0 a 300,300 0 1,0 600,0 a 300,300 0 1,0 -600,0 M500,500 m -220, 0 a 220,220 0 1,0 440,0" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/></svg></div>
        <div id="layout-grid" class="overlay-layer"><div class="line grid-v1"></div><div class="line grid-v2"></div><div class="line grid-h1"></div><div class="line grid-h2"></div></div>
        <div id="layout-framing" class="overlay-layer"><div class="frame-outer"></div><div class="frame-inner"></div></div>
        <div id="layout-triangle" class="overlay-layer"><svg class="triangle-svg"><polygon points="50%,35% 8%,75% 92%,75%" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/></svg></div>
        <div id="layout-double" class="overlay-layer"><div class="line double-v1"></div><div class="line double-v2"></div></div>
        <div id="layout-diagonal" class="overlay-layer"><svg class="diagonal-svg"><line x1="0" y1="80%" x2="100%" y2="45%" stroke="rgba(255,255,255,0.6)" stroke-width="2"/></svg></div>

        <div class="controls-panel">
            <div class="mode-selector">
                <button class="mode-btn selected" onclick="changeLayout('spiral', this)">Ốc Sên</button>
                <button class="mode-btn" onclick="changeLayout('grid', this)">Lưới 1/3</button>
                <button class="mode-btn" onclick="changeLayout('framing', this)">Khung Hình</button>
                <button class="mode-btn" onclick="changeLayout('triangle', this)">Tam Giác</button>
                <button class="mode-btn" onclick="changeLayout('double', this)">Đường Đôi</button>
                <button class="mode-btn" onclick="changeLayout('diagonal', this)">Đường Chéo</button>
            </div>
            <div class="action-area">
                <div class="shutter-container">
                    <button class="shutter-btn" onclick="takePhoto(false)"></button>
                    <span class="shutter-label">Thường</span>
                </div>
                <div class="shutter-container">
                    <button class="shutter-btn ai-mode" onclick="takePhoto(true)"></button>
                    <span class="shutter-label" style="color:#00ffff; font-weight:900;">Chụp AI</span>
                </div>
            </div>
        </div>
    </div>

    <div class="preview-container" id="previewView">
        <div class="status-header" id="previewTitle" style="color: #ffeb3b;">ANIME COLORING</div>
        <div class="preview-box"><div class="image-wrapper"><img id="previewImage" alt="Preview"><div class="gradient-overlay" id="gradientOverlay"></div></div></div>
        <div class="filter-bar" id="filterBar"></div>
        <div class="bottom-actions">
            <button class="action-btn btn-cancel" onclick="cancelPreview()">Chụp lại</button>
            <button class="action-btn btn-download" onclick="downloadFinalImage()">Lưu Về Máy</button>
        </div>
    </div>

    <div id="loadingToast" class="loading-toast">👽 ĐANG XỬ LÝ...</div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cameraView = document.getElementById('cameraView');
        const previewView = document.getElementById('previewView');
        const previewImage = document.getElementById('previewImage');
        const gradientOverlay = document.getElementById('gradientOverlay');
        const filterBar = document.getElementById('filterBar');
        const loadingToast = document.getElementById('loadingToast');
        const previewTitle = document.getElementById('previewTitle');

        let currentStream = null, useFacingMode = "environment", originalImageDataUrl = '', selectedFilterId = 'shinkai-vibes';

        const filtersConfig = [
            { id: 'normal', name: 'Màu Gốc', filterCSS: 'none', blend: 'none', gradStyle: '' },
            { id: 'sky-pro', name: 'Trời Xanh', filterCSS: 'contrast(106%) saturate(145%) brightness(103%) hue-rotate(5deg)', blend: 'overlay', gradStyle: 'linear-gradient(to top, rgba(135,206,235,0.1), transparent)' },
            { id: 'shinkai-vibes', name: 'Mộng Mơ', filterCSS: 'brightness(102%) contrast(108%) saturate(140%) sepia(3%)', blend: 'overlay', gradStyle: 'linear-gradient(135deg, rgba(255,200,220,0.15), rgba(135,206,255,0.1))' },
            { id: 'peach-anime', name: 'Đào Tiên', filterCSS: 'brightness(104%) contrast(102%) saturate(118%) hue-rotate(-3deg)', blend: 'overlay', gradStyle: 'linear-gradient(135deg, rgba(255,182,193,0.12), rgba(255,225,200,0.08))' },
            { id: 'ghibli-summer', name: 'Mùa Hè', filterCSS: 'contrast(106%) saturate(135%) hue-rotate(12deg) brightness(101%)', blend: 'none', gradStyle: '' },
            { id: 'nostalgia', name: 'Hoài Niệm', filterCSS: 'contrast(95%) sepia(18%) saturate(102%) brightness(104%)', blend: 'overlay', gradStyle: 'linear-gradient(45deg, rgba(210,105,30,0.06), rgba(255,165,0,0.03))' },
            { id: 'clear-clean', name: 'Trong Trẻo', filterCSS: 'contrast(108%) saturate(115%) brightness(105%) hue-rotate(2deg)', blend: 'none', gradStyle: '' },
            { id: 'candy-pastel', name: 'Candy', filterCSS: 'brightness(102%) contrast(96%) saturate(125%) hue-rotate(-10deg)', blend: 'overlay', gradStyle: 'linear-gradient(to bottom, rgba(200,255,200,0.08), rgba(255,200,255,0.08))' },
            { id: 'dreamy-pink', name: 'Hồng Thơ', filterCSS: 'brightness(102%) contrast(98%) saturate(115%) sepia(5%) hue-rotate(320deg)', blend: 'color', gradStyle: 'linear-gradient(to right, rgba(255,182,193,0.15), rgba(255,200,230,0.1))' },
            { id: 'fresh-forest', name: 'Rừng Xanh', filterCSS: 'contrast(105%) saturate(155%) hue-rotate(15deg) brightness(98%)', blend: 'none', gradStyle: '' },
            { id: 'golden-sun', name: 'Nắng Ấm', filterCSS: 'contrast(102%) saturate(125%) brightness(102%) sepia(10%)', blend: 'overlay', gradStyle: 'linear-gradient(135deg, rgba(255,215,0,0.18), transparent)' },
            { id: 'cyan-orange', name: 'Teal/Orange', filterCSS: 'contrast(115%) saturate(115%) hue-rotate(-10deg) brightness(96%)', blend: 'overlay', gradStyle: 'linear-gradient(to right, rgba(0,128,128,0.12), rgba(255,165,0,0.05))' },
            { id: 'urban-light', name: 'Ánh Phố', filterCSS: 'brightness(103%) contrast(110%) saturate(125%) hue-rotate(50deg)', blend: 'color-burn', gradStyle: 'linear-gradient(to top, rgba(200,255,255,0.1), transparent)' },
            { id: 'indie-vibe', name: 'Indie', filterCSS: 'contrast(112%) brightness(98%) saturate(135%) sepia(12%) hue-rotate(15deg)', blend: 'none', gradStyle: '' },
            { id: 'deep-moody', name: 'Noir Moody', filterCSS: 'grayscale(100%) contrast(140%) brightness(92%) sepia(20%)', blend: 'none', gradStyle: '' },
            { id: 'icy-cold', name: 'Lạnh Giá', filterCSS: 'brightness(105%) contrast(115%) saturate(80%) sepia(10%) hue-rotate(150deg)', blend: 'color', gradStyle: 'linear-gradient(to left, rgba(0,191,255,0.15), transparent)' },
            { id: 'sweet-cream', name: 'Creamy', filterCSS: 'brightness(108%) contrast(92%) saturate(108%) sepia(5%)', blend: 'overlay', gradStyle: 'linear-gradient(to bottom, rgba(255,250,240,0.2), rgba(255,239,213,0.1))' },
            { id: 'vintage-tv', name: 'Màu Phim', filterCSS: 'contrast(92%) sepia(28%) saturate(100%) brightness(96%) hue-rotate(-5deg)', blend: 'none', gradStyle: '' },
            { id: 'purple-dream', name: 'Tím Thơ', filterCSS: 'brightness(104%) contrast(106%) saturate(120%) sepia(5%) hue-rotate(240deg)', blend: 'overlay', gradStyle: 'linear-gradient(135deg, rgba(200,160,255,0.15), rgba(135,206,235,0.08))' },
            { id: 'bw-art', name: 'Mono Art', filterCSS: 'grayscale(100%) contrast(165%) brightness(88%)', blend: 'none', gradStyle: '' }
        ];

        async function initCam() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: useFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
                video.srcObject = currentStream;
            } catch (err) {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = currentStream;
            }
        }

        function toggleCamera() { useFacingMode = (useFacingMode === "environment") ? "user" : "environment"; initCam(); }
        function changeLayout(l, b) { document.querySelectorAll('.overlay-layer').forEach(y => y.classList.remove('active')); document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('selected')); document.getElementById(`layout-${l}`).classList.add('active'); b.classList.add('selected'); }

        function renderFilterBar() {
            filterBar.innerHTML = '';
            filtersConfig.forEach(f => {
                const item = document.createElement('div');
                item.className = `filter-item ${f.id === selectedFilterId ? 'active' : ''}`;
                item.onclick = () => selectFilter(f.id);
                let ts = `filter: ${f.filterCSS}; background: ${f.gradStyle ? f.gradStyle : 'linear-gradient(to bottom, #444, #111)'};`;
                item.innerHTML = `<div class="filter-thumb" style="${ts}"></div><div class="filter-name">${f.name}</div>`;
                filterBar.appendChild(item);
            });
        }

        function selectFilter(id) {
            selectedFilterId = id; const t = filtersConfig.find(f => f.id === id);
            previewImage.style.filter = t.filterCSS;
            gradientOverlay.style.background = t.gradStyle ? t.gradStyle : 'none';
            if(t.gradStyle) gradientOverlay.style.mixBlendMode = t.blend;
            renderFilterBar();
        }

        function takePhoto(isAI) {
            const ctx = canvas.getContext('2d'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            if (useFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height); ctx.setTransform(1, 0, 0, 1, 0, 0);
            originalImageDataUrl = canvas.toDataURL('image/png'); previewImage.src = originalImageDataUrl;
            
            if(isAI) {
                loadingToast.innerText = "🤖 AI ĐANG QUÉT KHUNG CẢNH VÀ ÁP MÀU...";
                loadingToast.style.display = 'block';
                setTimeout(() => {
                    loadingToast.style.display = 'none';
                    cameraView.style.display = 'none'; previewView.style.display = 'flex';
                    previewTitle.innerHTML = "✨ AI AUTO MATCHED FILTER ✨";
                    
                    // Thuật toán AI thông minh tự chọn 1 trong 5 tone màu đỉnh nhất dựa trên bối cảnh ngẫu nhiên
                    const aiPool = ['sky-pro', 'shinkai-vibes', 'peach-anime', 'ghibli-summer', 'clear-clean'];
                    const randomFilter = aiPool[Math.floor(Math.random() * aiPool.length)];
                    selectFilter(randomFilter);
                }, 1200);
            } else {
                cameraView.style.display = 'none'; previewView.style.display = 'flex';
                previewTitle.innerHTML = "ANIME COLORING";
                selectFilter('shinkai-vibes');
            }
        }

        function cancelPreview() { previewView.style.display = 'none'; cameraView.style.display = 'flex'; }

        function downloadFinalImage() {
            loadingToast.innerText = "👽 ĐANG XUẤT FILE ANIME..."; loadingToast.style.display = 'block';
            const img = new Image(); img.src = originalImageDataUrl;
            img.onload = function() {
                const ctx = canvas.getContext('2d'); canvas.width = img.width; canvas.height = img.height;
                const cf = filtersConfig.find(f => f.id === selectedFilterId);
                ctx.filter = cf.filterCSS; ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                if(cf.gradStyle) {
                    ctx.globalCompositeOperation = cf.blend === 'none' ? 'source-over' : cf.blend;
                    let g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    if(cf.id==='sky-pro') { g = ctx.createLinearGradient(0, canvas.height, 0, 0); g.addColorStop(0, "rgba(135,206,235,0.1)"); g.addColorStop(1, "transparent"); }
                    else if(cf.id==='shinkai-vibes') { g.addColorStop(0, "rgba(255,200,220,0.15)"); g.addColorStop(1, "rgba(135,206,255,0.1)"); }
                    else if(cf.id==='peach-anime') { g.addColorStop(0, "rgba(255,182,193,0.12)"); g.addColorStop(1, "rgba(255,225,200,0.08)"); }
                    else if(cf.id==='dreamy-pink') { g = ctx.createLinearGradient(0, 0, canvas.width, 0); g.addColorStop(0, "rgba(255,182,193,0.15)"); g.addColorStop(1, "rgba(255,200,230,0.1)"); }
                    else if(cf.id==='cyan-orange') { g = ctx.createLinearGradient(0, 0, canvas.width, 0); g.addColorStop(0, "rgba(0,128,128,0.12)"); g.addColorStop(1, "rgba(255,165,0,0.05)"); }
                    ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                ctx.globalCompositeOperation = 'source-over'; ctx.filter = "none";
                canvas.toBlob(function(b) {
                    const u = URL.createObjectURL(b); const l = document.createElement('a'); l.href = u; l.download = `Sopcare_AI_${new Date().getTime()}.png`;
                    document.body.appendChild(l); l.click();
                    setTimeout(() => { document.body.removeChild(l); URL.revokeObjectURL(u); loadingToast.style.display = 'none'; }, 500);
                }, 'image/png', 1.0);
            };
        }
        window.addEventListener('DOMContentLoaded', () => { initCam(); renderFilterBar(); });
    </script>
</body>
</html>
