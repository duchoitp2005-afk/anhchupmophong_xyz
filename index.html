<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quay Video & Xuất Phụ Đề Chuẩn</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #f5f5f5;
            text-align: center;
        }

        .tip-text {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            background: #222;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px dashed #444;
            max-width: 500px;
        }

        .video-container {
            width: 100%;
            max-width: 600px;
            background-color: #1a1a1a;
            border-radius: 16px;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            aspect-ratio: 4/3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .subtitle-overlay {
            position: absolute;
            bottom: 30px;
            left: 5%;
            width: 90%;
            text-align: center;
            z-index: 10;
        }

        .subtitle-text {
            background-color: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            display: inline-block;
            max-width: 100%;
            word-wrap: break-word;
            line-height: 1.4;
            border: 2px solid transparent;
            outline: none;
            cursor: text;
            transition: all 0.2s ease;
        }

        .subtitle-text:focus {
            border-color: #0084ff;
            background-color: rgba(0, 0, 0, 0.95);
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background-color: #222;
            color: white;
            border: 1px solid #444;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #333;
            transform: scale(1.02);
        }

        .btn-start { background-color: #0084ff; border-color: #0084ff; }
        .btn-record { background-color: #e50914; border-color: #e50914; }
        .btn-stop { background-color: #555; border-color: #666; }
        
        .btn-download { background-color: #00a86b; border-color: #00a86b; text-decoration: none; display: inline-block; }
        .btn-sub { background-color: #ff6e00; border-color: #ff6e00; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <h2>QUAY VIDEO + PHỤ ĐỀ TIẾNG VIỆT V4 🎙️</h2>
    <div class="tip-text">💡 Sau khi dừng quay, bạn bấm tải cả file Video và file Phụ đề về. Khi đưa vào CapCut/TikTok chữ sẽ tự khớp tự động!</div>

    <div class="video-container">
        <video id="preview" autoplay playsinline muted></video>
        <div class="subtitle-overlay">
            <span id="subtitle" class="subtitle-text" contenteditable="true" onfocus="pauseRecognition()" onblur="resumeRecognition()">Phụ đề tự động xuất hiện tại đây...</span>
        </div>
    </div>

    <div class="controls">
        <button id="btn-open" class="btn btn-start" onclick="openCamera()">Mở Camera 📷</button>
        <button id="btn-switch" class="btn" onclick="switchCamera()" style="display: none;">Đổi Camera 🔄</button>
        <button id="btn-start-rec" class="btn btn-record" onclick="startRecording()" style="display: none;">Bắt Đầu Quay 🔴</button>
        <button id="btn-stop-rec" class="btn btn-stop" onclick="stopRecording()" style="display: none;">Dừng Quay ⏹️</button>
        
        <a id="btn-download" class="btn btn-download" style="display: none;">Tải Video Về 🎬</a>
        <a id="btn-download-sub" class="btn btn-sub" style="display: none;">Tải File Phụ Đề (.srt) 📑</a>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let streamObj = null;
        let recognition;
        let isUserEditing = false;
        let currentFacingMode = 'user';

        // Biến phục vụ tính toán thời gian tạo file phụ đề .srt
        let startTime;
        let srtRecords = [];
        let currentSubIndex = 1;
        let subStartTime = 0;

        const preview = document.getElementById('preview');
        const subtitleTxt = document.getElementById('subtitle');
        
        const btnOpen = document.getElementById('btn-open');
        const btnSwitch = document.getElementById('btn-switch');
        const btnStartRec = document.getElementById('btn-start-rec');
        const btnStopRec = document.getElementById('btn-stop-rec');
        const btnDownload = document.getElementById('btn-download');
        const btnDownloadSub = document.getElementById('btn-download-sub');

        async function openCamera() {
            if (streamObj) {
                streamObj.getTracks().forEach(track => track.stop());
            }

            try {
                streamObj = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode },
                    audio: true
                });
                
                preview.srcObject = streamObj;
                btnOpen.style.display = 'none';
                btnSwitch.style.display = 'inline-block';
                btnStartRec.style.display = 'inline-block';
                
                if (!recognition) initSpeechRecognition();
            } catch (err) {
                alert("Không thể khởi động Camera/Microphone!");
            }
        }

        async function switchCamera() {
            if (mediaRecorder && mediaRecorder.state === "recording") return;
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            await openCamera();
        }

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'vi-VN'; 

            recognition.onresult = function(event) {
                if (isUserEditing) return;

                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                let text = finalTranscript || interimTranscript;
                if(text.trim() !== "") {
                    // Lưu lại câu cũ vào danh sách srt trước khi đổi câu mới nếu đang quay
                    if (mediaRecorder && mediaRecorder.state === "recording" && finalTranscript) {
                        saveSrtSegment(finalTranscript);
                    }
                    subtitleTxt.innerText = text;
                }
            };

            recognition.onend = function() {
                if (mediaRecorder && mediaRecorder.state === "recording" && !isUserEditing) {
                    try { recognition.start(); } catch(e) {}
                }
            };
        }

        function pauseRecognition() {
            isUserEditing = true;
            if (recognition) { try { recognition.stop(); } catch(e) {} }
        }

        function resumeRecognition() {
            isUserEditing = false;
            if (mediaRecorder && mediaRecorder.state === "recording" && recognition) {
                try { recognition.start(); } catch(e) {}
            }
        }

        // Hàm ghi nhận mốc thời gian để xuất file phụ đề .srt
        function saveSrtSegment(text) {
            const endTime = (Date.now() - startTime) / 1000;
            srtRecords.push({
                index: currentSubIndex++,
                start: formatTimeSRT(subStartTime),
                end: formatTimeSRT(endTime),
                text: text.trim()
            });
            subStartTime = endTime;
        }

        // Định dạng thời gian chuẩn SRT: HH:MM:SS,mmm
        function formatTimeSRT(seconds) {
            const date = new Date(null);
            date.setSeconds(seconds);
            const ms = Math.floor((seconds % 1) * 1000).toString().padStart(3, '0');
            return date.toISOString().substr(11, 8) + ',' + ms;
        }

        // BẮT ĐẦU QUAY VIDEO GỐC (Nhẹ máy, không bao giờ lỗi)
        function startRecording() {
            recordedChunks = [];
            srtRecords = [];
            currentSubIndex = 1;
            subStartTime = 0;
            startTime = Date.now();
            
            subtitleTxt.innerText = "Hãy nói câu đầu tiên hoặc bấm vào sửa chữ...";
            btnDownload.style.display = 'none';
            btnDownloadSub.style.display = 'none';
            btnSwitch.style.display = 'none';

            // Kiểm tra định dạng video được máy hỗ trợ tốt nhất
            let options = {};
            if (MediaRecorder.isTypeSupported('video/mp4')) {
                options = { mimeType: 'video/mp4' }; // Tối ưu nhất cho iPhone/Safari
            } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
                options = { mimeType: 'video/webm;codecs=vp9' };
            }

            try {
                mediaRecorder = new MediaRecorder(streamObj, options);
            } catch(e) {
                mediaRecorder = new MediaRecorder(streamObj);
            }
            
            mediaRecorder.ondataavailable = function(e) {
                if (e.data && e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = function() {
                // Lưu nốt câu cuối cùng đang hiển thị trên màn hình
                saveSrtSegment(subtitleTxt.innerText);

                // 1. Xử lý xuất file Video gốc
                const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                const videoUrl = URL.createObjectURL(blob);
                const extension = mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
                btnDownload.href = videoUrl;
                btnDownload.download = `video_goc.${extension}`;
                btnDownload.style.display = 'inline-block';

                // 2. Xử lý tạo và xuất file phụ đề .srt dữ liệu văn bản
                let srtContent = '';
                srtRecords.forEach(item => {
                    srtContent += `${item.index}\n${item.start} --> ${item.end}\n${item.text}\n\n`;
                });
                const srtBlob = new Blob([srtContent], { type: 'text/srt' });
                btnDownloadSub.href = URL.createObjectURL(srtBlob);
                btnDownloadSub.download = 'phude_tiengviet.srt';
                btnDownloadSub.style.display = 'inline-block';

                btnSwitch.style.display = 'inline-block';
            };

            mediaRecorder.start();
            if (recognition && !isUserEditing) { try { recognition.start(); } catch(e) {} }

            btnStartRec.style.display = 'none';
            btnStopRec.style.display = 'inline-block';
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            if (recognition) { try { recognition.stop(); } catch(e) {} }
            btnStartRec.style.display = 'inline-block';
            btnStopRec.style.display = 'none';
        }
    </script>
</body>
</html>
