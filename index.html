<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopcare - Camera Đa Bố Cục & Auto Filter</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Các lớp nền hiển thị lưới bố cục trên màn hình */
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        .active { display: block; }
        .line { position: absolute; background-color: rgba(255, 255, 255, 0.5); box-shadow: 0 0 3px rgba(0,0,0,0.6); }

        /* 1. Bố cục 1/3 */
        .grid-v1, .grid-v2 { width: 1px; height: 100%; top: 0; } .grid-v1 { left: 33.33%; } .grid-v2 { left: 66.66%; }
        .grid-h1, .grid-h2 { height: 1px; width: 100%; left: 0; } .grid-h1 { top: 33.33%; } .grid-h2 { top: 66.66%; }
        
        /* 2. Bố cục Khung hình */
        .frame-box { position: absolute; top: 15%; left: 10%; width: 80%; height: 55%; border: 2px solid rgba(255, 255, 255, 0.6); }
        .frame-focus { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 100px; border: 1.5px dashed #ffeb3b; }
        
        /* 3. Bố cục Tam giác */
        .triangle-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* 4. Bố cục Trung tâm */
        .center-v1, .center-v2 { width: 2px; height: 100%; top: 0; background-color: rgba(255, 255, 255, 0.6); } .center-v1 { left: 45%; } .center-v2 { left: 55%; }

        /* Panel điều khiển phía dưới */
        .controls-panel { position: absolute; bottom: 0; width: 100%; height: 110px; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding-bottom: 10px; z-index: 10; }
        .mode-selector { width: 100%; display: flex; justify-content: center; gap: 8px; overflow-x: auto; padding: 5px 10px; }
        .mode-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; }
        .mode-btn.selected { background: #ffeb3b; color: #000; font-weight: bold; }
        .shutter-btn { width: 55px; height: 55px; border-radius: 50%; background-color: #fff; border: 4px solid rgba(255, 255, 255, 0.3); cursor: pointer; }

        /* KHU VỰC HIỂN THỊ ẢNH SAU KHI ĐÃ ĐƯỢC ÉP LỌC MÀU XỊN */
        .preview-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20; justify-content: center; align-items: center; flex-direction: column; }
        #capturedImage { max-width: 90%; max-height: 75%; border: 2px solid #fff; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .preview-tip { color: #ffeb3b; margin-top: 15px; font-size: 14px; text-align: center; font-weight: bold; }
        .close-btn { margin-top: 15px; background: #fff; color: #000; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>

        <div id="layout-thirds" class="overlay-layer active">
            <div class="line grid-v1"></div><div class="line grid-v2"></div>
            <div class="line grid-h1"></div><div class="line grid-h2"></div>
        </div>
        <div id="layout-framing" class="overlay-layer">
            <div class="frame-box"></div><div class="frame-focus"></div>
        </div>
        <div id="layout-triangle" class="overlay-layer">
            <svg class="triangle-svg">
                <line x1="0" y1="50%" x2="100%" y2="50%" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
                <polygon points="50%,15% 0%,50% 100%,50%" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
            </svg>
        </div>
        <div id="layout-center" class="overlay-layer">
            <div class="line center-v1"></div><div class="line center-v2"></div>
        </div>

        <div class="controls-panel">
            <div class="mode-selector">
                <button class="mode-btn selected" onclick="changeLayout('thirds', this)">Bố cục 1/3</button>
                <button class="mode-btn" onclick="changeLayout('framing', this)">Khung hình</button>
                <button class="mode-btn" onclick="changeLayout('triangle', this)">Tam giác</button>
                <button class="mode-btn" onclick="changeLayout('center', this)">Trung tâm</button>
            </div>
            <button class="shutter-btn" onclick="takePhoto()"></button>
        </div>
    </div>

    <div id="previewContainer" class="preview-container">
        <img id="capturedImage" alt="Ảnh đã căn bố cục và chỉnh màu tự động">
        <p class="preview-tip">📸 ĐÃ CĂN BỐ CỤC & TỰ ĐỘNG LỌC MÀU ĐẸP 📸<br>👉 Ấn giữ im vào ảnh 2 giây để Lưu về máy nha!</p>
        <button class="close-btn" onclick="closePreview()">Chụp tiếp</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const previewContainer = document.getElementById('previewContainer');
        const capturedImage = document.getElementById('capturedImage');

        // Khởi động Camera sau của máy
        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false }).then(stream => { video.srcObject = stream; });
            }
        }

        // Thay đổi qua lại giữa các đường lưới căn chỉnh bố cục
        function changeLayout(layoutName, btnElement) {
            document.querySelectorAll('.overlay-layer').forEach(layer => layer.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`layout-${layoutName}`).classList.add('active');
            btnElement.classList.add('selected');
        }

        // TÍNH NĂNG KẾT HỢP: CHỤP - ÉP FILTER CHỈNH MÀU TỰ ĐỘNG - XUẤT ẢNH LƯU TRỮ
        function takePhoto() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // TỰ ĐỘNG CHỈNH MÀU SẮC ĐẸP: Tăng độ tương phản nịnh mắt, tăng độ tươi màu sắc, chỉnh lại độ sáng trong trẻo
            ctx.filter = "contrast(116%) saturate(128%) brightness(103%)";
            
            // Đóng băng luồng hình ảnh từ camera đưa lên canvas ngầm
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.filter = "none"; // Trả lại filter mặc định cho camera live
            
            // Đổ hình ảnh thành phẩm sang ô xem trước để người dùng ấn giữ lưu thủ công dễ dàng
            capturedImage.src = canvas.toDataURL('image/png');
            previewContainer.style.display = 'flex';
        }

        function closePreview() {
            previewContainer.style.display = 'none';
        }

        window.addEventListener('DOMContentLoaded', initCam);
    </script>
</body>
</html>
