<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dazz Cam Web App</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #f5f5f5;
        }

        /* Khung hiển thị ảnh/camera ở giữa */
        .preview-container {
            width: 100%;
            max-width: 500px;
            min-height: 380px;
            background-color: #1a1a1a;
            border-radius: 16px;
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .preview-container video, .preview-container img {
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            display: none; /* Ẩn mặc định, hiện bằng JS */
        }

        .placeholder-text {
            color: #666;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        /* Bàn điều khiển nút bấm */
        .controls {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background-color: #222;
            color: white;
            border: 1px solid #444;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #333;
            transform: scale(1.02);
        }

        .btn-capture { background-color: #e50914; border-color: #e50914; }
        .btn-capture:hover { background-color: #b80710; }

        .btn-apply { background-color: #ff6e00; border-color: #ff6e00; font-weight: bold; }
        .btn-apply:hover { background-color: #e06100; }

        .btn-download { background-color: #0084ff; border-color: #0084ff; text-decoration: none; display: inline-block; }
        .btn-download:hover { background-color: #006cd2; }
    </style>
</head>
<body>

    <h2>DAZZ WEBCAM 📸</h2>

    <div class="preview-container">
        <p id="placeholder" class="placeholder-text">Mở máy ảnh hoặc tải ảnh lên để bắt đầu</p>
        <video id="video" autoplay playsinline></video>
        <img id="img-original" alt="Original">
        <img id="img-processed" alt="Dazz Result">
    </div>

    <div class="controls">
        <div class="btn-group">
            <button id="btn-camera" class="btn" onclick="startCamera()">Mở Máy Ảnh 📷</button>
            <button id="btn-capture" class="btn btn-capture" onclick="capturePhoto()" style="display: none;">Bấm Chụp ⚪</button>
            
            <label class="btn">
                Tải Ảnh Lên 📁
                <input type="file" id="file-input" accept="image/*" onchange="handleFileUpload()" style="display: none;">
            </label>
        </div>

        <div class="btn-group">
            <button id="btn-filter" class="btn btn-apply" onclick="applyDazzFilter()" style="display: none;">Áp Dụng Bộ Lọc D-Classic ✨</button>
            <a id="btn-download" class="btn btn-download" download="dazz_photo.jpg" style="display: none;">Lưu Về Máy 💾</a>
        </div>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        // CẤU HÌNH BỘ LỌC PHIM
        const FILTER_CONFIG = {
            warmth: 0.15,         // Độ ấm màu vàng/đỏ
            contrast: 1.25,       // Độ tương phản
            vignette: 0.55,       // Độ tối 4 góc ảnh
            grainOpacity: 0.12,   // Mật độ hạt nhiễu phim
            lightLeakColor: 'rgba(255, 95, 0, 0.22)' // Màu rò rỉ sáng cam
        };

        let streamObj = null;
        let activeImageSrc = null;

        const video = document.getElementById('video');
        const imgOriginal = document.getElementById('img-original');
        const imgProcessed = document.getElementById('img-processed');
        const placeholder = document.getElementById('placeholder');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Nút điều khiển UI
        const btnCamera = document.getElementById('btn-camera');
        const btnCapture = document.getElementById('btn-capture');
        const btnFilter = document.getElementById('btn-filter');
        const btnDownload = document.getElementById('btn-download');

        // BƯỚC 2: TÍCH HỢP CAMERA & UPLOAD
        function resetUI() {
            video.style.display = 'none';
            imgOriginal.style.display = 'none';
            imgProcessed.style.display = 'none';
            placeholder.style.display = 'none';
            btnFilter.style.display = 'none';
            btnDownload.style.display = 'none';
        }

        async function startCamera() {
            resetUI();
            stopCamera();
            try {
                streamObj = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = streamObj;
                video.style.display = 'block';
                btnCamera.style.display = 'none';
                btnCapture.style.display = 'inline-block';
            } catch (err) {
                alert("Không thể truy cập camera. Hãy kiểm tra quyền trình duyệt.");
                placeholder.style.display = 'block';
            }
        }

        function stopCamera() {
            if (streamObj) {
                streamObj.getTracks().forEach(track => track.stop());
                streamObj = null;
            }
            btnCamera.style.display = 'inline-block';
            btnCapture.style.display = 'none';
        }

        function capturePhoto() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            activeImageSrc = canvas.toDataURL('image/jpeg');
            stopCamera();
            resetUI();
            
            imgOriginal.src = activeImageSrc;
            imgOriginal.style.display = 'block';
            btnFilter.style.display = 'inline-block';
        }

        function handleFileUpload() {
            stopCamera();
            const file = document.getElementById('file-input').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    activeImageSrc = e.target.result;
                    resetUI();
                    imgOriginal.src = activeImageSrc;
                    imgOriginal.style.display = 'block';
                    btnFilter.style.display = 'inline-block';
                }
                reader.readAsDataURL(file);
            }
        }

        // BƯỚC 3 & 4: THUẬT TOÁN XỬ LÝ ẢNH MÁY PHIM
        function applyDazzFilter() {
            if (!activeImageSrc) return;

            const img = new Image();
            img.src = activeImageSrc;
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                // 3B. Xử lý sửa ma trận pixel (Màu ấm, Tương phản)
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i + 1];
                    let b = data[i + 2];

                    // Tương phản (Contrast)
                    r = ((r / 255 - 0.5) * FILTER_CONFIG.contrast + 0.5) * 255;
                    g = ((g / 255 - 0.5) * FILTER_CONFIG.contrast + 0.5) * 255;
                    b = ((b / 255 - 0.5) * FILTER_CONFIG.contrast + 0.5) * 255;

                    // Độ ấm film màu (Warmth)
                    r += FILTER_CONFIG.warmth * 35;
                    g += FILTER_CONFIG.warmth * 12;
                    b -= FILTER_CONFIG.warmth * 15;

                    data[i] = Math.min(255, Math.max(0, r));
                    data[i + 1] = Math.min(255, Math.max(0, g));
                    data[i + 2] = Math.min(255, Math.max(0, b));
                }
                ctx.putImageData(imageData, 0, 0);

                // 4A. Hiệu ứng tối góc (Vignette)
                const gradient = ctx.createRadialGradient(
                    canvas.width / 2, canvas.height / 2, 0,
                    canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.7
                );
                gradient.addColorStop(0, 'rgba(0,0,0,0)');
                gradient.addColorStop(1, `rgba(0,0,0,${FILTER_CONFIG.vignette})`);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Hiệu ứng rò rỉ sáng (Light Leak)
                ctx.fillStyle = FILTER_CONFIG.lightLeakColor;
                ctx.beginPath();
                ctx.arc(0, 0, canvas.width * 0.45, 0, Math.PI * 2);
                ctx.fill();

                // Tạo hạt nhiễu (Film Grain)
                for (let x = 0; x < canvas.width; x += 2) {
                    for (let y = 0; y < canvas.height; y += 2) {
                        if (Math.random() < FILTER_CONFIG.grainOpacity) {
                            ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.13)' : 'rgba(0,0,0,0.13)';
                            ctx.fillRect(x, y, 2, 2);
                        }
                    }
                }

                // 4B. In dấu thời gian (Timestamp)
                const now = new Date();
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = String(now.getFullYear()).substring(2);
                const dateString = `'${year} ${month} ${day}`;

                const fontSize = Math.max(16, Math.floor(canvas.width * 0.038));
                ctx.font = `bold ${fontSize}px "Courier New", monospace`;
                ctx.fillStyle = 'rgba(255, 105, 0, 0.85)';
                
                ctx.shadowColor = 'rgba(40, 10, 0, 0.6)';
                ctx.shadowBlur = 4;

                const textX = canvas.width - ctx.measureText(dateString).width - (canvas.width * 0.05);
                const textY = canvas.height - (canvas.height * 0.05);
                ctx.fillText(dateString, textX, textY);
                ctx.shadowBlur = 0;

                // BƯỚC 5: XUẤT ẢNH THÀNH PHẨM
                const resultDataUrl = canvas.toDataURL('image/jpeg', 0.9);
                resetUI();
                imgProcessed.src = resultDataUrl;
                imgProcessed.style.display = 'block';
                
                btnDownload.href = resultDataUrl;
                btnDownload.style.display = 'inline-block';
                btnFilter.style.display = 'none';
            };
        }
    </script>
</body>
</html>
