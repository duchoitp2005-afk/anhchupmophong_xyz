<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopcare - Canon M50 Professional Camera</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0d0d0d; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Giao diện tối giản phong cách máy ảnh cơ chuyên nghiệp */
        .status-header { position: absolute; top: 15px; width: 100%; text-align: center; color: #fff; font-weight: 600; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; z-index: 10; opacity: 0.8; }
        .sub-header { position: absolute; top: 35px; width: 100%; text-align: center; color: #ff3333; font-weight: bold; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; z-index: 10; }

        /* Lưới căn góc nhiếp ảnh */
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 3; }
        .active { display: block; }
        .line { position: absolute; background-color: rgba(255, 255, 255, 0.4); box-shadow: 0 0 2px rgba(0,0,0,0.5); }

        .spiral-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .grid-v1, .grid-v2 { width: 1px; height: 100%; top: 0; } .grid-v1 { left: 33.33%; } .grid-v2 { left: 66.66%; }
        .grid-h1, .grid-h2 { height: 1px; width: 100%; left: 0; } .grid-h1 { top: 33.33%; } .grid-h2 { top: 66.66%; }
        .frame-outer { position: absolute; top: 12%; left: 12%; width: 76%; height: 60%; border: 1px dashed rgba(255, 255, 255, 0.4); }
        .frame-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 25px; height: 25px; border: 1px solid #ff3333; border-radius: 2px; }

        /* Thanh điều khiển máy ảnh */
        .controls-panel { position: absolute; bottom: 0; width: 100%; height: 135px; background: rgba(15, 15, 15, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding-bottom: 12px; z-index: 10; border-top: 1px solid #222; }
        .mode-selector { width: 100%; display: flex; justify-content: flex-start; gap: 8px; overflow-x: auto; padding: 6px 15px; scrollbar-width: none; }
        .mode-selector::-webkit-scrollbar { display: none; }
        .mode-btn { background: #222; border: 1px solid #333; color: #aaa; padding: 6px 14px; border-radius: 4px; font-size: 11px; cursor: pointer; text-transform: uppercase; white-space: nowrap; font-weight: 600; }
        .mode-btn.selected { background: #fff; color: #000; border-color: #fff; font-weight: bold; }

        .action-area { width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; }
        .footer-text { color: #aaa; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .shutter-btn { width: 60px; height: 60px; border-radius: 50%; background-color: #fff; border: 5px solid #222; cursor: pointer; box-shadow: 0 0 0 2px #fff; }
        .shutter-btn:active { background-color: #ccc; }

        /* MÀN HÌNH XEM TRƯỚC VÀ CHỌN BỘ LỌC CANON M50 */
        .preview-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 20; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px 0; }
        .preview-box { width: 100%; height: 56%; display: flex; justify-content: center; align-items: center; position: relative; background: #080808; }
        
        .image-wrapper { position: relative; max-width: 92%; max-height: 100%; display: flex; justify-content: center; align-items: center; border-radius: 4px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        #previewImage { width: 100%; height: 100%; object-fit: contain; }
        .gradient-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* Thanh cuộn ngang chọn 10 filter Canon chuyên nghiệp */
        .filter-bar { width: 100%; display: flex; gap: 10px; overflow-x: auto; padding: 12px; background: #1a1a1a; border-top: 1px solid #262626; border-bottom: 1px solid #262626; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-item { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 80px; cursor: pointer; }
        .filter-thumb { width: 54px; height: 54px; border-radius: 4px; border: 2px solid #333; overflow: hidden; transition: all 0.2s; background: #2a2a2a; }
        .filter-item.active .filter-thumb { border-color: #ff3333; transform: scale(1.03); }
        .filter-name { color: #888; font-size: 10px; text-align: center; white-space: nowrap; font-weight: 600; }
        .filter-item.active .filter-name { color: #fff; }

        /* Cụm nút lưu/hủy */
        .bottom-actions { width: 100%; display: flex; justify-content: center; gap: 15px; padding: 5px 20px; }
        .action-btn { padding: 12px 28px; border-radius: 4px; font-weight: bold; font-size: 13px; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-cancel { background: #222; color: #aaa; border: 1px solid #333; }
        .btn-download { background: #ff3333; color: #fff; box-shadow: 0 4px 12px rgba(255,51,51,0.2); }

        .loading-toast { display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); color: #fff; padding: 12px 24px; border-radius: 4px; font-weight: bold; font-size: 13px; z-index: 40; border-left: 3px solid #ff3333; text-align: center; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="camera-container" id="cameraView">
        <video id="video" autoplay playsinline></video>
        <div class="status-header">CANON EOS M50</div>
        <div class="sub-header">RAW • PICTURE STYLE ACTIVE</div>

        <div id="layout-grid" class="overlay-layer active"><div class="line grid-v1"></div><div class="line grid-v2"></div><div class="line grid-h1"></div><div class="line grid-h2"></div></div>
        <div id="layout-spiral" class="overlay-layer">
            <svg class="spiral-svg" viewBox="0 0 1000 1000"><path d="M500,500 m -300, 0 a 300,300 0 1,0 600,0 a 300,300 0 1,0 -600,0 M500,500 m -220, 0 a 220,220 0 1,0 440,0 a 220,220 0 1,0 -440,0" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/></svg>
        </div>
        <div id="layout-framing" class="overlay-layer"><div class="frame-outer"></div><div class="frame-inner"></div></div>

        <div class="controls-panel">
            <div class="mode-selector">
                <button class="mode-btn selected" onclick="changeLayout('grid', this)">Lưới 3x3</button>
                <button class="mode-btn" onclick="changeLayout('spiral', this)">Tỉ Lệ Vàng</button>
                <button class="mode-btn" onclick="changeLayout('framing', this)">Điểm Lấy Nét</button>
            </div>
            <div class="action-area">
                <div class="footer-text">10 PRESETS CHUYÊN NGHIỆP</div>
                <button class="shutter-btn" onclick="takePhoto()"></button>
            </div>
        </div>
    </div>

    <div class="preview-container" id="previewView">
        <div class="status-header">CANON CAMERA CONNECT • DEVELOPING</div>
        
        <div class="preview-box">
            <div class="image-wrapper">
                <img id="previewImage" alt="Preview ảnh chụp">
                <div class="gradient-overlay" id="gradientOverlay"></div>
            </div>
        </div>

        <div class="filter-bar" id="filterBar"></div>

        <div class="bottom-actions">
            <button class="action-btn btn-cancel" onclick="cancelPreview()">Chụp lại</button>
            <button class="action-btn btn-download" onclick="downloadFinalImage()">Xuất Ảnh (JPEG)</button>
        </div>
    </div>

    <div id="loadingToast" class="loading-toast">📸 ĐANG XUẤT ẢNH CHẤT LƯỢNG CAO...</div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cameraView = document.getElementById('cameraView');
        const previewView = document.getElementById('previewView');
        const previewImage = document.getElementById('previewImage');
        const gradientOverlay = document.getElementById('gradientOverlay');
        const filterBar = document.getElementById('filterBar');
        const loadingToast = document.getElementById('loadingToast');

        let originalImageDataUrl = '';
        let selectedFilterId = 'canon-standard';

        // 10 BỘ LỌC CÂN MỌI THỂ LOẠI - CHUYÊN TRỊ NGƯỜI & THIÊN NHIÊN ĐẸP NHƯ MÁY CƠ
        const filtersConfig = [
            { id: 'canon-standard', name: 'Canon Gốc', filterCSS: 'contrast(104%) saturate(110%) brightness(100%)', blend: 'none', grad: '' },
            { id: 'canon-portrait', name: '📸 M50 Portrait', filterCSS: 'brightness(105%) contrast(98%) saturate(108%) sepia(3%)', blend: 'overlay', grad: 'linear-gradient(to bottom, rgba(255,225,225,0.12), transparent)' },
            { id: 'creamy-skin', name: '✨ Cam Hồng Mịn', filterCSS: 'brightness(106%) contrast(95%) saturate(115%) hue-rotate(-4deg)', blend: 'overlay', grad: 'linear-gradient(135deg, rgba(255,192,203,0.1), rgba(255,239,213,0.08))' },
            { id: 'canon-landscape', name: '🌿 Landscape Pro', filterCSS: 'contrast(108%) saturate(135%) brightness(102%) hue-rotate(5deg)', blend: 'none', grad: '' },
            { id: 'japan-clean', name: '💎 Trong Trẻo Nhật', filterCSS: 'brightness(108%) contrast(94%) saturate(105%) hue-rotate(3deg)', blend: 'overlay', grad: 'linear-gradient(to top, rgba(135,206,235,0.1), transparent)' },
            { id: 'warm-vintage', name: '🍂 Vintage Ấm', filterCSS: 'contrast(96%) sepia(20%) saturate(105%) brightness(102%)', blend: 'overlay', grad: 'linear-gradient(45deg, rgba(210,105,30,0.08), transparent)' },
            { id: 'cinematic-teal', name: '🎞 Cine Teal', filterCSS: 'contrast(115%) saturate(115%) hue-rotate(-8deg) brightness(98%)', blend: 'overlay', grad: 'linear-gradient(to right, rgba(0,100,100,0.08), rgba(255,140,0,0.05))' },
            { id: 'golden-hour', name: '🌅 Golden Hour', filterCSS: 'contrast(102%) saturate(120%) brightness(104%) sepia(12%)', blend: 'overlay', grad: 'linear-gradient(135deg, rgba(255,140,0,0.15), rgba(255,0,128,0.05))' },
            { id: 'deep-forest', name: '🌲 Khói Rừng', filterCSS: 'contrast(110%) saturate(125%) hue-rotate(15deg) brightness(96%)', blend: 'multiply', grad: 'linear-gradient(rgba(0,50,0,0.04), transparent)' },
            { id: 'monochrome-pro', name: '🖤 Canon Mono', filterCSS: 'grayscale(100%) contrast(125%) brightness(98%)', blend: 'none', grad: '' }
        ];

        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false }).then(stream => { video.srcObject = stream; });
            }
        }

        function changeLayout(layoutName, btnElement) {
            document.querySelectorAll('.overlay-layer').forEach(layer => layer.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`layout-${layoutName}`).classList.add('active');
            btnElement.classList.add('selected');
        }

        function renderFilterBar() {
            filterBar.innerHTML = '';
            filtersConfig.forEach(f => {
                const item = document.createElement('div');
                item.className = `filter-item ${f.id === selectedFilterId ? 'active' : ''}`;
                item.onclick = () => selectFilter(f.id);

                let thumbStyle = `filter: ${f.filterCSS};`;
                if(f.grad) {
                    thumbStyle += `background: ${f.grad};`;
                } else {
                    thumbStyle += `background: linear-gradient(to bottom, #444, #222);`;
                }

                item.innerHTML = `
                    <div class="filter-thumb" style="${thumbStyle}"></div>
                    <div class="filter-name">${f.name}</div>
                `;
                filterBar.appendChild(item);
            });
        }

        function selectFilter(filterId) {
            selectedFilterId = filterId;
            const targetFilter = filtersConfig.find(f => f.id === filterId);
            
            previewImage.style.filter = targetFilter.filterCSS;
            
            if(targetFilter.grad) {
                gradientOverlay.style.background = targetFilter.grad;
                gradientOverlay.style.mixBlendMode = targetFilter.blend;
            } else {
                gradientOverlay.style.background = 'none';
            }

            renderFilterBar();
        }

        function takePhoto() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            originalImageDataUrl = canvas.toDataURL('image/png');
            
            previewImage.src = originalImageDataUrl;
            cameraView.style.display = 'none';
            previewView.style.display = 'flex';
            
            selectFilter('canon-standard');
        }

        function cancelPreview() {
            previewView.style.display = 'none';
            cameraView.style.display = 'flex';
        }

        function downloadFinalImage() {
            loadingToast.style.display = 'block';
            
            const imgElement = new Image();
            imgElement.src = originalImageDataUrl;
            
            imgElement.onload = function() {
                const ctx = canvas.getContext('2d');
                canvas.width = imgElement.width;
                canvas.height = imgElement.height;
                
                const currentFilter = filtersConfig.find(f => f.id === selectedFilterId);
                
                ctx.filter = currentFilter.filterCSS;
                ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
                
                if(currentFilter.grad) {
                    ctx.globalCompositeOperation = currentFilter.blend === 'none' ? 'source-over' : currentFilter.blend;
                    let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    
                    if(currentFilter.id === 'canon-portrait') {
                        gradient.addColorStop(0, "rgba(255,225,225,0.12)");
                        gradient.addColorStop(1, "transparent");
                    } else if(currentFilter.id === 'creamy-skin') {
                        gradient.addColorStop(0, "rgba(255,192,203,0.1)");
                        gradient.addColorStop(1, "rgba(255,239,213,0.08)");
                    } else if(currentFilter.id === 'japan-clean') {
                        gradient = ctx.createLinearGradient(0, canvas.height, 0, 0);
                        gradient.addColorStop(0, "rgba(135,206,235,0.1)");
                        gradient.addColorStop(1, "transparent");
                    } else if(currentFilter.id === 'warm-vintage') {
                        gradient.addColorStop(0, "rgba(210,105,30,0.08)");
                        gradient.addColorStop(1, "transparent");
                    } else if(currentFilter.id === 'cinematic-teal') {
                        gradient.addColorStop(0, "rgba(0,100,100,0.08)");
                        gradient.addColorStop(1, "rgba(255,140,0,0.05)");
                    } else if(currentFilter.id === 'golden-hour') {
                        gradient.addColorStop(0, "rgba(255,140,0,0.15)");
                        gradient.addColorStop(1, "rgba(255,0,128,0.05)");
                    } else if(currentFilter.id === 'deep-forest') {
                        gradient.addColorStop(0, "rgba(0,50,0,0.04)");
                        gradient.addColorStop(1, "transparent");
                    }
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                
                ctx.globalCompositeOperation = 'source-over';
                ctx.filter = "none";
                
                canvas.toBlob(function(blob) {
                    const fileUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = fileUrl;
                    link.download = `CanonM50_${currentFilter.id}_${new Date().getTime()}.png`;
                    document.body.appendChild(link);
                    link.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(link);
                        URL.revokeObjectURL(fileUrl);
                        loadingToast.style.display = 'none';
                    }, 500);
                }, 'image/png', 1.0);
            };
        }

        window.addEventListener('DOMContentLoaded', () => {
            initCam();
            renderFilterBar();
        });
    </script>
</body>
</html>
