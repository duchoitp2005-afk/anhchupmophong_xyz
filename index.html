<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biên Tập & Xuất Video Có Sẵn Phụ Đề</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #f5f5f5;
            text-align: center;
        }

        .tip-text {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            background: #222;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px dashed #444;
            max-width: 550px;
        }

        .video-container {
            width: 100%;
            max-width: 600px;
            background-color: #1a1a1a;
            border-radius: 16px;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            aspect-ratio: 4/3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #playback {
            display: none;
        }

        /* Canvas ẩn dùng để trộn chữ vào video */
        canvas {
            display: none;
        }

        .subtitle-overlay {
            position: absolute;
            bottom: 30px;
            left: 5%;
            width: 90%;
            text-align: center;
            z-index: 10;
        }

        .subtitle-text {
            background-color: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            display: inline-block;
            max-width: 100%;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .timeline-editor-zone {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .sub-list {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sub-item {
            background: #252525;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sub-item-meta {
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 12px;
            color: #aaa;
        }

        .sub-item-meta input {
            background: #111;
            border: 1px solid #444;
            color: #fff;
            padding: 3px 6px;
            border-radius: 4px;
            width: 60px;
            text-align: center;
        }

        .sub-item-text {
            background: #111;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        .sub-item-text:focus {
            border-color: #0084ff;
        }

        .btn-delete {
            background: #e50914;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            margin-left: auto;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background-color: #222;
            color: white;
            border: 1px solid #444;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #333;
            transform: scale(1.02);
        }

        .btn-start { background-color: #0084ff; border-color: #0084ff; }
        .btn-record { background-color: #e50914; border-color: #e50914; }
        .btn-stop { background-color: #ffaa00; border-color: #ffaa00; color: #000; }
        .btn-add { background-color: #00a86b; border-color: #00a86b; font-size: 12px; padding: 6px 12px; border-radius: 15px; }
        .btn-download { background-color: #00a86b; border-color: #00a86b; }
        
        #loading-text {
            color: #ffaa00;
            font-weight: bold;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>XUẤT VIDEO DÍNH LIỀN PHỤ ĐỀ V10 🎬</h2>
    <div class="tip-text">💡 Cách dùng: Quay xong ➡️ Kéo thanh trượt để thêm chữ gõ tay ➡️ Bấm "Bắt đầu xuất video" để hệ thống in chữ trực tiếp lên hình và tải về!</div>

    <div class="video-container">
        <video id="preview" autoplay playsinline muted></video>
        <video id="playback" playsinline></video>
        <div class="subtitle-overlay">
            <span id="subtitle" class="subtitle-text">Phụ đề hiển thị tại đây...</span>
        </div>
    </div>

    <canvas id="renderCanvas" width="640" height="480"></canvas>

    <div id="loading-text">⏳ Đang xử lý in chữ vào video, vui lòng đợi trong giây lát...</div>

    <div class="controls">
        <button id="btn-open" class="btn btn-start" onclick="openCamera()">Mở Camera 📷</button>
        <button id="btn-switch" class="btn" onclick="switchCamera()" style="display: none;">Đổi Camera 🔄</button>
        <button id="btn-start-rec" class="btn btn-record" onclick="startRecording()" style="display: none;">Bắt Đầu Quay 🔴</button>
        <button id="btn-stop-rec" class="btn btn-stop" onclick="stopRecording()" style="display: none;">Xong, Qua Trình Biên Tập ⏹️</button>
        
        <button id="btn-download" class="btn btn-download" onclick="exportVideoWithSubtitles()" style="display: none;">Bắt Đầu Xuất Video Có Sẵn Chữ 🎬</button>
    </div>

    <div id="editor-zone" class="timeline-editor-zone" style="display: none;">
        <div class="editor-header">
            <span style="font-weight: bold; font-size: 14px; color: #ffaa00;">DANH SÁCH DÒNG PHỤ ĐỀ TỰ GÕ</span>
            <button class="btn btn-add" onclick="addNewSubtitleAtCurrentTime()">➕ Thêm chữ tại giây này</button>
        </div>
        <div id="sub-list" class="sub-list"></div>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let streamObj = null;
        let currentFacingMode = 'user';
        let srtRecords = []; 

        const preview = document.getElementById('preview');
        const playback = document.getElementById('playback');
        const subtitleTxt = document.getElementById('subtitle');
        const editorZone = document.getElementById('editor-zone');
        const subListContainer = document.getElementById('sub-list');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const loadingText = document.getElementById('loading-text');
        
        const btnOpen = document.getElementById('btn-open');
        const btnSwitch = document.getElementById('btn-switch');
        const btnStartRec = document.getElementById('btn-start-rec');
        const btnStopRec = document.getElementById('btn-stop-rec');
        const btnDownload = document.getElementById('btn-download');

        async function openCamera() {
            if (streamObj) streamObj.getTracks().forEach(track => track.stop());
            preview.style.display = 'block';
            playback.style.display = 'none';
            editorZone.style.display = 'none';
            playback.controls = false;

            try {
                streamObj = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode },
                    audio: true
                });
                preview.srcObject = streamObj;
                btnOpen.style.display = 'none';
                btnSwitch.style.display = 'inline-block';
                btnStartRec.style.display = 'inline-block';
            } catch (err) {
                alert("Không thể khởi động Camera!");
            }
        }

        async function switchCamera() {
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            await openCamera();
        }

        function startRecording() {
            recordedChunks = [];
            srtRecords = [];
            subtitleTxt.innerText = "...";
            btnDownload.style.display = 'none';
            btnSwitch.style.display = 'none';

            let options = MediaRecorder.isTypeSupported('video/mp4') ? { mimeType: 'video/mp4' } : {};
            try { mediaRecorder = new MediaRecorder(streamObj, options); } catch(e) { mediaRecorder = new MediaRecorder(streamObj); }
            
            mediaRecorder.ondataavailable = function(e) {
                if (e.data && e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = function() {
                preview.style.display = 'none';
                playback.style.display = 'block';
                playback.controls = true; // Hiện thanh trượt khi biên tập
                editorZone.style.display = 'block'; 

                const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                playback.src = URL.createObjectURL(blob);
                
                playback.ontimeupdate = function() {
                    const checkTime = playback.currentTime;
                    const activeSub = srtRecords.find(sub => checkTime >= sub.start && checkTime <= sub.end);
                    subtitleTxt.innerText = activeSub ? activeSub.text : "...";
                };

                btnDownload.style.display = 'inline-block';
                btnSwitch.style.display = 'inline-block';
                btnOpen.style.display = 'inline-block';
                btnOpen.innerText = "Quay Lại 📷";
            };

            mediaRecorder.start();
            btnStartRec.style.display = 'none';
            btnStopRec.style.display = 'inline-block';
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            btnStartRec.style.display = 'inline-block';
            btnStopRec.style.display = 'none';
        }

        function addNewSubtitleAtCurrentTime() {
            const currentTime = playback.currentTime;
            const newSub = {
                id: Date.now(),
                start: parseFloat(currentTime.toFixed(2)),
                end: parseFloat((currentTime + 3).toFixed(2)),
                text: "Gõ phụ đề tiếng Việt..."
            };
            srtRecords.push(newSub);
            renderEditorList();
        }

        function renderEditorList() {
            subListContainer.innerHTML = "";
            srtRecords.sort((a, b) => a.start - b.start);
            srtRecords.forEach((item, index) => {
                const subItem = document.createElement('div');
                subItem.className = 'sub-item';
                subItem.innerHTML = `
                    <div class="sub-item-meta">
                        <span>Câu ${index + 1} | Từ giây:</span>
                        <input type="number" step="0.1" value="${item.start}" onchange="updateSubTime(${item.id}, 'start', this.value)">
                        <span>đến:</span>
                        <input type="number" step="0.1" value="${item.end}" onchange="updateSubTime(${item.id}, 'end', this.value)">
                        <button class="btn-delete" onclick="deleteSub(${item.id})">Xóa ❌</button>
                    </div>
                    <input type="text" class="sub-item-text" value="${item.text}" oninput="updateSubText(${item.id}, this.value)">
                `;
                subListContainer.appendChild(subItem);
            });
        }

        function updateSubTime(id, field, value) {
            const sub = srtRecords.find(item => item.id === id);
            if (sub) sub[field] = parseFloat(parseFloat(value).toFixed(2));
        }

        function updateSubText(id, value) {
            const sub = srtRecords.find(item => item.id === id);
            if (sub) sub.text = value.trim();
        }

        function deleteSub(id) {
            srtRecords = srtRecords.filter(item => item.id !== id);
            renderEditorList();
        }

        // BIẾN ĐỔI QUAN TRỌNG: IN CHỮ VÀO HÌNH VÀ XUẤT FILE VIDEO DUY NHẤT
        function exportVideoWithSubtitles() {
            playback.pause();
            playback.currentTime = 0; // Chạy lại từ đầu để quay video mới
            playback.controls = false; // Ẩn thanh trượt gốc tránh bị dính vào video mới
            
            loadingText.style.display = 'block';
            btnDownload.disabled = true;

            const exportChunks = [];
            // Lấy luồng hình ảnh từ canvas kết hợp luồng âm thanh gốc của video
            const canvasStream = canvas.captureStream(25); 
            
            let audioTrack = null;
            if (playback.captureStream) {
                audioTrack = playback.captureStream().getAudioTracks()[0];
            } else if (playback.webkitCaptureStream) {
                audioTrack = playback.webkitCaptureStream().getAudioTracks()[0];
            }
            
            if (audioTrack) {
                canvasStream.addTrack(audioTrack);
            }

            let options = MediaRecorder.isTypeSupported('video/mp4') ? { mimeType: 'video/mp4' } : {};
            const encoder = new MediaRecorder(canvasStream, options);

            encoder.ondataavailable = function(e) {
                if (e.data && e.data.size > 0) exportChunks.push(e.data);
            };

            encoder.onstop = function() {
                loadingText.style.display = 'none';
                btnDownload.disabled = false;
                playback.controls = true;

                const finalBlob = new Blob(exportChunks, { type: encoder.mimeType });
                const extension = encoder.mimeType.includes('mp4') ? 'mp4' : 'webm';
                
                // Kích hoạt cơ chế tải tệp cưỡng bức an toàn
                const a = document.createElement('a');
                a.href = URL.createObjectURL(finalBlob);
                a.download = `video_co_phude.${extension}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            encoder.start();
            playback.play();

            // Vòng lặp vẽ liên tục hình ảnh video + chữ phụ đề lên canvas ẩn
            function drawFrame() {
                if (playback.paused || playback.ended) {
                    encoder.stop();
                    return;
                }
                
                // 1. Vẽ hình ảnh video gốc
                ctx.drawImage(playback, 0, 0, canvas.width, canvas.height);
                
                // 2. Kiểm tra xem giây hiện tại có chữ không để vẽ đè lên
                const checkTime = playback.currentTime;
                const activeSub = srtRecords.find(sub => checkTime >= sub.start && checkTime <= sub.end);
                
                if (activeSub) {
                    // Vẽ nền đen cho chữ dễ đọc
                    ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
                    ctx.fillRect(40, canvas.height - 70, canvas.width - 80, 45);

                    // Vẽ chữ phụ đề màu trắng
                    ctx.fillStyle = "#ffffff";
                    ctx.font = "bold 20px Arial";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(activeSub.text, canvas.width / 2, canvas.height - 48);
                }
                
                requestAnimationFrame(drawFrame);
            }
            
            playback.onplay = function() {
                drawFrame();
            };
        }
    </script>
</body>
</html>
