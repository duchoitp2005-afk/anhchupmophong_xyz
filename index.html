<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopcare - Camera 10 Filter Người & Thiên Nhiên</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Open Sans', Arial, sans-serif; }
        
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .status-header { position: absolute; top: 12px; width: 100%; text-align: center; color: #ff007f; font-weight: bold; font-size: 16px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 8px #ff007f; }

        /* Lớp hiển thị lưới bố cục */
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 3; }
        .active { display: block; }
        .line { position: absolute; background-color: rgba(255, 255, 255, 0.6); box-shadow: 0 0 4px rgba(0,0,0,0.7); }

        /* Các đường lưới bố cục chuẩn */
        .spiral-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .grid-v1, .grid-v2 { width: 1.5px; height: 100%; top: 0; } .grid-v1 { left: 33.33%; } .grid-v2 { left: 66.66%; }
        .grid-h1, .grid-h2 { height: 1.5px; width: 100%; left: 0; } .grid-h1 { top: 33.33%; } .grid-h2 { top: 66.66%; }
        .frame-outer { position: absolute; top: 15%; left: 10%; width: 80%; height: 55%; border: 2px solid rgba(255, 255, 255, 0.7); }
        .frame-inner { position: absolute; top: 70%; left: 44%; width: 12%; height: 15%; border: 1.5px solid rgba(255, 255, 255, 0.8); }
        .triangle-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .double-v1, .double-v2 { width: 1.5px; height: 100%; top: 0; } .double-v1 { left: 45%; } .double-v2 { left: 55%; }
        .diagonal-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Panel điều khiển camera */
        .controls-panel { position: absolute; bottom: 0; width: 100%; height: 125px; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding-bottom: 12px; z-index: 10; }
        .mode-selector { width: 100%; display: flex; justify-content: flex-start; gap: 8px; overflow-x: auto; padding: 6px 15px; scrollbar-width: none; }
        .mode-selector::-webkit-scrollbar { display: none; }
        .mode-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 7px 14px; border-radius: 18px; font-size: 11px; cursor: pointer; text-transform: uppercase; white-space: nowrap; font-weight: bold; }
        .mode-btn.selected { background: #ffeb3b; color: #000; box-shadow: 0 0 8px #ffeb3b; }

        .action-area { width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; }
        .footer-text { color: #ffeb3b; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .shutter-btn { width: 58px; height: 58px; border-radius: 50%; background-color: #fff; border: 4px solid rgba(255, 255, 255, 0.35); cursor: pointer; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* INTERFACE XEM TRƯỚC VÀ CHỈNH 10 BỘ LỌC SAU KHI CHỤP */
        .preview-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0b0b0b; z-index: 20; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px 0; }
        .preview-box { width: 100%; height: 58%; display: flex; justify-content: center; align-items: center; position: relative; }
        
        #previewImage { max-width: 90%; max-height: 100%; border: 2px solid #333; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); object-fit: contain; }

        /* Thanh chứa 10 Bộ lọc màu cuộn ngang */
        .filter-bar { width: 100%; display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: #161616; border-top: 1px solid #222; border-bottom: 1px solid #222; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-item { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 75px; cursor: pointer; }
        .filter-thumb { width: 55px; height: 55px; border-radius: 8px; border: 2px solid #444; background: #333; overflow: hidden; transition: all 0.2s; }
        .filter-item.active .filter-thumb { border-color: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        .filter-name { color: #aaa; font-size: 10px; text-align: center; white-space: nowrap; }
        .filter-item.active .filter-name { color: #00ffcc; font-weight: bold; }

        /* Cụm nút thao tác dưới cùng */
        .bottom-actions { width: 100%; display: flex; justify-content: center; gap: 20px; padding: 5px 20px; }
        .action-btn { padding: 12px 28px; border-radius: 25px; font-weight: bold; font-size: 14px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-cancel { background: #222; color: #fff; border: 1px solid #444; }
        .btn-download { background: #00ffcc; color: #000; box-shadow: 0 4px 15px rgba(0,255,204,0.3); }

        .loading-toast { display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); color: #00ffcc; padding: 15px 25px; border-radius: 25px; font-weight: bold; font-size: 14px; z-index: 40; border: 1px solid #00ffcc; text-align: center; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="camera-container" id="cameraView">
        <video id="video" autoplay playsinline></video>
        <div class="status-header">MÀN HÌNH CĂN GÓC CHUẨN</div>

        <div id="layout-spiral" class="overlay-layer active">
            <svg class="spiral-svg" viewBox="0 0 1000 1000">
                <path d="M500,500 m -300, 0 a 300,300 0 1,0 600,0 a 300,300 0 1,0 -600,0 M500,500 m -220, 0 a 220,220 0 1,0 440,0 a 220,220 0 1,0 -440,0 M500,500 m -140, 0 a 140,140 0 1,0 280,0 a 140,140 0 1,0 -280,0 M500,500 m -60, 0 a 60,60 0 1,0 120,0 a 60,60 0 1,0 -120,0" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>
            </svg>
        </div>
        <div id="layout-grid" class="overlay-layer"><div class="line grid-v1"></div><div class="line grid-v2"></div><div class="line grid-h1"></div><div class="line grid-h2"></div></div>
        <div id="layout-framing" class="overlay-layer"><div class="frame-outer"></div><div class="frame-inner"></div></div>
        <div id="layout-triangle" class="overlay-layer">
            <svg class="triangle-svg"><line x1="0" y1="50%" x2="100%" y2="50%" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/><polygon points="50%,38% 5%,75% 95%,75%" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/></svg>
        </div>
        <div id="layout-double" class="overlay-layer"><div class="line double-v1"></div><div class="line double-v2"></div></div>
        <div id="layout-diagonal" class="overlay-layer"><svg class="diagonal-svg"><line x1="0" y1="80%" x2="100%" y2="45%" stroke="rgba(255,255,255,0.75)" stroke-width="2.5"/></svg></div>

        <div class="controls-panel">
            <div class="mode-selector">
                <button class="mode-btn selected" onclick="changeLayout('spiral', this)">Ốc Sên</button>
                <button class="mode-btn" onclick="changeLayout('grid', this)">1/3 Grid</button>
                <button class="mode-btn" onclick="changeLayout('framing', this)">Khung Hình</button>
                <button class="mode-btn" onclick="changeLayout('triangle', this)">Tam Giác</button>
                <button class="mode-btn" onclick="changeLayout('double', this)">Đường Đôi</button>
                <button class="mode-btn" onclick="changeLayout('diagonal', this)">Đường Chéo</button>
            </div>
            <div class="action-area">
                <div class="footer-text">BỐ CỤC CHUẨN</div>
                <button class="shutter-btn" onclick="takePhoto()"></button>
            </div>
        </div>
    </div>

    <div class="preview-container" id="previewView">
        <div class="status-header" style="color: #00ffcc; text-shadow: 0 0 8px #00ffcc;">CHỌN FILTER "ẢO MA"</div>
        
        <div class="preview-box">
            <img id="previewImage" alt="Preview ảnh chụp">
        </div>

        <div class="filter-bar" id="filterBar"></div>

        <div class="bottom-actions">
            <button class="action-btn btn-cancel" onclick="cancelPreview()">Chụp lại</button>
            <button class="action-btn btn-download" onclick="downloadFinalImage()">Tải ảnh xuống</button>
        </div>
    </div>

    <div id="loadingToast" class="loading-toast">🚀 ĐANG XỬ LÝ LƯU FILE...</div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cameraView = document.getElementById('cameraView');
        const previewView = document.getElementById('previewView');
        const previewImage = document.getElementById('previewImage');
        const filterBar = document.getElementById('filterBar');
        const loadingToast = document.getElementById('loadingToast');

        let originalImageDataUrl = '';
        let selectedFilterId = 'normal';

        // 10 Bộ lọc màu mới cực ảo cho Chân dung (Người) và Phong cảnh (Thiên nhiên)
        const filtersConfig = [
            { id: 'normal', name: 'Màu Gốc', filterCSS: 'none', grad: null },
            { id: 'korean-skin', name: '✨ Trắng Hàn', filterCSS: 'brightness(108%) contrast(96%) saturate(105%) sepia(4%)', grad: null },
            { id: 'peach-cream', name: '🍑 Cam Đào', filterCSS: 'brightness(104%) contrast(102%) saturate(115%) hue-rotate(-5deg)', grad: 'linear-gradient(135deg, rgba(255,182,193,0.15), rgba(255,218,185,0.1))' },
            { id: 'foodie-nature', name: '🌿 Fresh Leaf', filterCSS: 'contrast(106%) saturate(145%) hue-rotate(8deg) brightness(102%)', grad: null },
            { id: 'cyber-teal', name: '🌌 Teal & Orange', filterCSS: 'contrast(120%) saturate(130%) hue-rotate(-12deg)', grad: 'linear-gradient(to right, rgba(0,128,128,0.1), rgba(255,165,0,0.08))' },
            { id: 'dreamy-sunset', name: '🌅 Sunset Ảo', filterCSS: 'contrast(112%) saturate(135%) brightness(103%)', grad: 'linear-gradient(135deg, rgba(135,206,235,0.22), rgba(255,182,193,0.25))' },
            { id: 'vintage-film', name: '🎞 Phim Cổ', filterCSS: 'contrast(92%) sepia(30%) saturate(95%) brightness(98%) hue-rotate(-5deg)', grad: null },
            { id: 'indie-vibe', name: '🎒 Indie Vibe', filterCSS: 'contrast(115%) brightness(96%) saturate(125%) sepia(15%)', grad: 'linear-gradient(to bottom, rgba(255,255,0,0.05), transparent)' },
            { id: 'clear-sky', name: '💎 Trong Trẻo', filterCSS: 'contrast(112%) saturate(120%) brightness(106%) hue-rotate(5deg)', grad: null },
            { id: 'deep-moody', name: '🖤 Noir Mood', filterCSS: 'grayscale(100%) contrast(145%) brightness(92%)', grad: null }
        ];

        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false }).then(stream => { video.srcObject = stream; });
            }
        }

        function changeLayout(layoutName, btnElement) {
            document.querySelectorAll('.overlay-layer').forEach(layer => layer.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`layout-${layoutName}`).classList.add('active');
            btnElement.classList.add('selected');
        }

        function renderFilterBar() {
            filterBar.innerHTML = '';
            filtersConfig.forEach(f => {
                const item = document.createElement('div');
                item.className = `filter-item ${f.id === selectedFilterId ? 'active' : ''}`;
                item.onclick = () => selectFilter(f.id);

                let thumbStyle = `filter: ${f.filterCSS};`;
                if(f.grad) {
                    thumbStyle += `background: ${f.grad};`;
                } else {
                    thumbStyle += `background: linear-gradient(to bottom, #555, #222);`;
                }

                item.innerHTML = `
                    <div class="filter-thumb" style="${thumbStyle}"></div>
                    <div class="filter-name">${f.name}</div>
                `;
                filterBar.appendChild(item);
            });
        }

        function selectFilter(filterId) {
            selectedFilterId = filterId;
            const targetFilter = filtersConfig.find(f => f.id === filterId);
            
            previewImage.style.filter = targetFilter.filterCSS;
            
            if(targetFilter.grad) {
                previewImage.style.background = targetFilter.grad;
            } else {
                previewImage.style.background = 'none';
            }

            renderFilterBar();
        }

        function takePhoto() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            originalImageDataUrl = canvas.toDataURL('image/png');
            
            previewImage.src = originalImageDataUrl;
            cameraView.style.display = 'none';
            previewView.style.display = 'flex';
            
            selectFilter('normal');
        }

        function cancelPreview() {
            previewView.style.display = 'none';
            cameraView.style.display = 'flex';
        }

        function downloadFinalImage() {
            loadingToast.style.display = 'block';
            
            const imgElement = new Image();
            imgElement.src = originalImageDataUrl;
            
            imgElement.onload = function() {
                const ctx = canvas.getContext('2d');
                canvas.width = imgElement.width;
                canvas.height = imgElement.height;
                
                const currentFilter = filtersConfig.find(f => f.id === selectedFilterId);
                
                ctx.filter = currentFilter.filterCSS;
                ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
                
                if(currentFilter.grad) {
                    ctx.globalCompositeOperation = 'overlay';
                    let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    // Đổ màu gradient tương ứng bộ lọc dựa theo cấu hình
                    if(currentFilter.id === 'peach-cream') {
                        gradient.addColorStop(0, "rgba(255, 182, 193, 0.15)");
                        gradient.addColorStop(1, "rgba(255, 218, 185, 0.1)");
                    } else if(currentFilter.id === 'cyber-teal') {
                        gradient.addColorStop(0, "rgba(0, 128, 128, 0.1)");
                        gradient.addColorStop(1, "rgba(255, 165, 0, 0.08)");
                    } else if(currentFilter.id === 'dreamy-sunset') {
                        gradient.addColorStop(0, "rgba(135, 206, 235, 0.22)");
                        gradient.addColorStop(0.5, "rgba(255, 182, 193, 0.25)");
                        gradient.addColorStop(1, "rgba(135, 206, 235, 0.22)");
                    } else if(currentFilter.id === 'indie-vibe') {
                        gradient.addColorStop(0, "rgba(255, 255, 0, 0.05)");
                        gradient.addColorStop(1, "transparent");
                    }
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                
                ctx.globalCompositeOperation = 'source-over';
                ctx.filter = "none";
                
                canvas.toBlob(function(blob) {
                    const fileUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = fileUrl;
                    link.download = `Sopcare_${currentFilter.id}_${new Date().getTime()}.png`;
                    document.body.appendChild(link);
                    link.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(link);
                        URL.revokeObjectURL(fileUrl);
                        loadingToast.style.display = 'none';
                    }, 500);
                }, 'image/png', 1.0);
            };
        }

        window.addEventListener('DOMContentLoaded', () => {
            initCam();
            renderFilterBar();
        });
    </script>
</body>
</html>
