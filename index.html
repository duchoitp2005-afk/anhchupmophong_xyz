<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopcare - Ultra Filters Activated</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', Arial, sans-serif; }
        
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Tiêu đề Neon phát sáng rực rỡ như hình mẫu */
        .status-header { position: absolute; top: 15px; width: 100%; text-align: center; color: #00ffcc; font-weight: 900; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 10px #00ffcc, 0 0 20px #00a8ff; }
        .sub-header { position: absolute; top: 38px; width: 100%; text-align: center; color: #ff007f; font-weight: bold; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 5px #ff007f; }

        /* Lưới căn góc */
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 3; }
        .active { display: block; }
        .line { position: absolute; background-color: rgba(0, 255, 255, 0.4); box-shadow: 0 0 5px rgba(0, 255, 255, 0.6); }

        /* Các đường lưới phát sáng nhẹ cyan nghệ thuật */
        .spiral-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; filter: drop-shadow(0px 0px 3px rgba(0,255,204,0.6)); }
        .grid-v1, .grid-v2 { width: 1.5px; height: 100%; top: 0; } .grid-v1 { left: 33.33%; } .grid-v2 { left: 66.66%; }
        .grid-h1, .grid-h2 { height: 1.5px; width: 100%; left: 0; } .grid-h1 { top: 33.33%; } .grid-h2 { top: 66.66%; }
        .frame-outer { position: absolute; top: 15%; left: 10%; width: 80%; height: 55%; border: 1.5px solid rgba(0, 255, 255, 0.5); }
        .frame-inner { position: absolute; top: 70%; left: 44%; width: 12%; height: 15%; border: 1.5px solid rgba(255, 0, 127, 0.6); }
        .triangle-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Panel điều khiển camera bên dưới */
        .controls-panel { position: absolute; bottom: 0; width: 100%; height: 135px; background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.75)); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding-bottom: 12px; z-index: 10; border-top: 1px solid rgba(255,255,255,0.05); }
        .mode-selector { width: 100%; display: flex; justify-content: flex-start; gap: 8px; overflow-x: auto; padding: 6px 15px; scrollbar-width: none; }
        .mode-selector::-webkit-scrollbar { display: none; }
        .mode-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: #ccc; padding: 7px 14px; border-radius: 20px; font-size: 11px; cursor: pointer; text-transform: uppercase; white-space: nowrap; font-weight: bold; }
        .mode-btn.selected { background: #00ffcc; color: #000; font-weight: 900; border-color: #00ffcc; box-shadow: 0 0 12px rgba(0,255,204,0.6); }

        .action-area { width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; }
        .footer-text { color: #ff007f; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; text-shadow: 0 0 5px #ff007f; }
        .shutter-btn { width: 62px; height: 62px; border-radius: 50%; background-color: #ffeb3b; border: 5px solid rgba(255, 235, 59, 0.3); cursor: pointer; box-shadow: 0 0 15px rgba(255,235,59,0.5); font-weight: bold; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; color: #000; }

        /* GIAO DIỆN CHỈNH 10 SIÊU BỘ LỌC SAU KHI BẤM CHỤP */
        .preview-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #020202; z-index: 20; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px 0; }
        .preview-box { width: 100%; height: 56%; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; background: #090909; }
        
        /* Khung chứa ảnh và lớp màu ảo chập đôi */
        .image-wrapper { position: relative; max-width: 90%; max-height: 100%; display: flex; justify-content: center; align-items: center; border-radius: 16px; overflow: hidden; border: 1px solid #222; box-shadow: 0 20px 40px rgba(0,0,0,0.9); }
        #previewImage { width: 100%; height: 100%; object-fit: contain; transition: filter 0.15s ease; }
        .gradient-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; mix-blend-mode: overlay; }

        /* Thanh cuộn 10 bộ lọc cực ngầu */
        .filter-bar { width: 100%; display: flex; gap: 12px; overflow-x: auto; padding: 15px; background: #0c0c0c; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-item { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 78px; cursor: pointer; }
        .filter-thumb { width: 56px; height: 56px; border-radius: 12px; border: 2px solid #252525; overflow: hidden; transition: all 0.2s; background: #151515; }
        .filter-item.active .filter-thumb { border-color: #00ffcc; box-shadow: 0 0 12px #00ffcc; transform: scale(1.05); }
        .filter-name { color: #777; font-size: 10px; text-align: center; white-space: nowrap; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-item.active .filter-name { color: #00ffcc; text-shadow: 0 0 5px rgba(0,255,204,0.5); }

        /* Nút lưu ảnh */
        .bottom-actions { width: 100%; display: flex; justify-content: center; gap: 15px; padding: 5px 20px; }
        .action-btn { padding: 12px 30px; border-radius: 25px; font-weight: 800; font-size: 13px; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-cancel { background: #161616; color: #888; border: 1px solid #252525; }
        .btn-download { background: linear-gradient(90deg, #ff007f, #7f00ff); color: #fff; box-shadow: 0 0 15px rgba(255,0,127,0.4); }

        .loading-toast { display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); color: #00ffcc; padding: 15px 30px; border-radius: 30px; font-weight: bold; font-size: 13px; z-index: 40; border: 1px solid #00ffcc; letter-spacing: 1px; text-align: center; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="camera-container" id="cameraView">
        <video id="video" autoplay playsinline></video>
        <div class="status-header">SOPCARE</div>
        <div class="sub-header">ULTRA-FILTERS ACTIVATED</div>

        <div id="layout-spiral" class="overlay-layer active">
            <svg class="spiral-svg" viewBox="0 0 1000 1000">
                <path d="M500,500 m -300, 0 a 300,300 0 1,0 600,0 a 300,300 0 1,0 -600,0 M500,500 m -220, 0 a 220,220 0 1,0 440,0 a 220,220 0 1,0 -440,0 M500,500 m -140, 0 a 140,140 0 1,0 280,0 a 140,140 0 1,0 -280,0 M500,500 m -60, 0 a 60,60 0 1,0 120,0 a 60,60 0 1,0 -120,0" fill="none" stroke="rgba(0,255,204,0.6)" stroke-width="2.5"/>
            </svg>
        </div>
        <div id="layout-grid" class="overlay-layer"><div class="line grid-v1"></div><div class="line grid-v2"></div><div class="line grid-h1"></div><div class="line grid-h2"></div></div>
        <div id="layout-framing" class="overlay-layer"><div class="frame-outer"></div><div class="frame-inner"></div></div>
        <div id="layout-triangle" class="overlay-layer">
            <svg class="triangle-svg"><polygon points="50%,35% 8%,75% 92%,75%" fill="none" stroke="rgba(0,255,204,0.6)" stroke-width="2.5"/></svg>
        </div>

        <div class="controls-panel">
            <div class="mode-selector">
                <button class="mode-btn selected" onclick="changeLayout('spiral', this)">Ốc Sên</button>
                <button class="mode-btn" onclick="changeLayout('grid', this)">Lưới 1/3</button>
                <button class="mode-btn" onclick="changeLayout('framing', this)">Khung Hình</button>
                <button class="mode-btn" onclick="changeLayout('triangle', this)">Tam Giác</button>
            </div>
            <div class="action-area">
                <div class="footer-text">10 BỘ LỌC SIÊU XỊN</div>
                <button class="shutter-btn" onclick="takePhoto()">Chụp</button>
            </div>
        </div>
    </div>

    <div class="preview-container" id="previewView">
        <div class="status-header" style="color: #ff007f; text-shadow: 0 0 10px #ff007f;">FILTER SELECTION</div>
        
        <div class="preview-box">
            <div class="image-wrapper">
                <img id="previewImage" alt="Preview ảnh chụp">
                <div class="gradient-overlay" id="gradientOverlay"></div>
            </div>
        </div>

        <div class="filter-bar" id="filterBar"></div>

        <div class="bottom-actions">
            <button class="action-btn btn-cancel" onclick="cancelPreview()">Chụp lại</button>
            <button class="action-btn btn-download" onclick="downloadFinalImage()">Lưu Về Máy</button>
        </div>
    </div>

    <div id="loadingToast" class="loading-toast">🛸 ĐANG ÉP MÀU SIÊU CẤP...</div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cameraView = document.getElementById('cameraView');
        const previewView = document.getElementById('previewView');
        const previewImage = document.getElementById('previewImage');
        const gradientOverlay = document.getElementById('gradientOverlay');
        const filterBar = document.getElementById('filterBar');
        const loadingToast = document.getElementById('loadingToast');

        let originalImageDataUrl = '';
        let selectedFilterId = 'normal';

        // DANH SÁCH 10 BỘ LỌC SIÊU ẢO - CHỤP XẤU CŨNG ĐẸP
        const filtersConfig = [
            { id: 'normal', name: 'Màu Gốc', filterCSS: 'none', blend: 'none', gradStyle: '' },
            { id: 'cyber-pink', name: '🔮 Cyber Dream', filterCSS: 'contrast(130%) saturate(155%) brightness(102%) hue-rotate(-15deg)', blend: 'overlay', gradStyle: 'linear-gradient(135deg, #00ffff 0%, #ff00ff 100%)' },
            { id: 'sunset-chill', name: '🌅 Sunset Chill', filterCSS: 'contrast(120%) saturate(145%) brightness(104%)', blend: 'overlay', gradStyle: 'linear-gradient(45deg, #ff4500 0%, #ff00a0 50%, #7f00ff 100%)' },
            { id: 'neon-glow', name: '🧪 Neon Glow', filterCSS: 'contrast(135%) saturate(160%) hue-rotate(45deg) brightness(98%)', blend: 'color-burn', gradStyle: 'linear-gradient(to top, rgba(0,255,128,0.2), transparent)' },
            { id: 'korean-glow', name: '👱🏻‍♀️ Da Thiên Thần', filterCSS: 'brightness(114%) contrast(92%) saturate(108%) sepia(8%)', blend: 'overlay', gradStyle: 'linear-gradient(to bottom, rgba(255,200,200,0.2), transparent)' },
            { id: 'foodie-forest', name: '🍃 Siêu Cây Cối', filterCSS: 'contrast(112%) saturate(180%) hue-rotate(12deg) brightness(103%)', blend: 'none', gradStyle: '' },
            { id: 'vintage-cinema', name: '🎞 Cine Vintage', filterCSS: 'contrast(115%) sepia(25%) saturate(110%) brightness(95%) hue-rotate(-8deg)', blend: 'multiply', gradStyle: 'linear-gradient(rgba(0,0,50,0.05), rgba(50,30,0,0.05))' },
            { id: 'aqua-marine', name: '💎 Xanh Ngọc', filterCSS: 'contrast(118%) saturate(125%) hue-rotate(140deg) brightness(102%)', blend: 'overlay', gradStyle: 'linear-gradient(to right, rgba(0,255,255,0.15), transparent)' },
            { id: 'golden-hour', name: '💛 Giờ Vàng', filterCSS: 'contrast(110%) saturate(130%) brightness(105%) sepia(30%)', blend: 'overlay', gradStyle: 'linear-gradient(135deg, rgba(255,165,0,0.25), transparent)' },
            { id: 'noir-art', name: '🖤 Film Noir Art', filterCSS: 'grayscale(100%) contrast(165%) brightness(90%)', blend: 'none', gradStyle: '' }
        ];

        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false }).then(stream => { video.srcObject = stream; });
            }
        }

        function changeLayout(layoutName, btnElement) {
            document.querySelectorAll('.overlay-layer').forEach(layer => layer.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`layout-${layoutName}`).classList.add('active');
            btnElement.classList.add('selected');
        }

        function renderFilterBar() {
            filterBar.innerHTML = '';
            filtersConfig.forEach(f => {
                const item = document.createElement('div');
                item.className = `filter-item ${f.id === selectedFilterId ? 'active' : ''}`;
                item.onclick = () => selectFilter(f.id);

                let thumbStyle = `filter: ${f.filterCSS};`;
                if(f.gradStyle) {
                    thumbStyle += `background: ${f.gradStyle};`;
                } else {
                    thumbStyle += `background: linear-gradient(to bottom, #444, #111);`;
                }

                item.innerHTML = `
                    <div class="filter-thumb" style="${thumbStyle}"></div>
                    <div class="filter-name">${f.name}</div>
                `;
                filterBar.appendChild(item);
            });
        }

        function selectFilter(filterId) {
            selectedFilterId = filterId;
            const targetFilter = filtersConfig.find(f => f.id === filterId);
            
            previewImage.style.filter = targetFilter.filterCSS;
            
            if(targetFilter.gradStyle) {
                gradientOverlay.style.background = targetFilter.gradStyle;
                gradientOverlay.style.mixBlendMode = targetFilter.blend;
            } else {
                gradientOverlay.style.background = 'none';
            }

            renderFilterBar();
        }

        function takePhoto() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            originalImageDataUrl = canvas.toDataURL('image/png');
            
            previewImage.src = originalImageDataUrl;
            cameraView.style.display = 'none';
            previewView.style.display = 'flex';
            
            selectFilter('normal');
        }

        function cancelPreview() {
            previewView.style.display = 'none';
            cameraView.style.display = 'flex';
        }

        function downloadFinalImage() {
            loadingToast.style.display = 'block';
            
            const imgElement = new Image();
            imgElement.src = originalImageDataUrl;
            
            imgElement.onload = function() {
                const ctx = canvas.getContext('2d');
                canvas.width = imgElement.width;
                canvas.height = imgElement.height;
                
                const currentFilter = filtersConfig.find(f => f.id === selectedFilterId);
                
                // Ép lớp filter đồ họa nền
                ctx.filter = currentFilter.filterCSS;
                ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
                
                // Ép chặt lớp màu gradient lồng ghép phức tạp
                if(currentFilter.gradStyle) {
                    ctx.globalCompositeOperation = currentFilter.blend === 'none' ? 'source-over' : currentFilter.blend;
                    let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    
                    if(currentFilter.id === 'cyber-pink') {
                        gradient.addColorStop(0, "#00ffff");
                        gradient.addColorStop(1, "#ff00ff");
                    } else if(currentFilter.id === 'sunset-chill') {
                        gradient.addColorStop(0, "#ff4500");
                        gradient.addColorStop(0.5, "#ff00a0");
                        gradient.addColorStop(1, "#7f00ff");
                    } else if(currentFilter.id === 'neon-glow') {
                        gradient = ctx.createLinearGradient(0, canvas.height, 0, 0);
                        gradient.addColorStop(0, "rgba(0,255,128,0.25)");
                        gradient.addColorStop(1, "transparent");
                    } else if(currentFilter.id === 'korean-glow') {
                        gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                        gradient.addColorStop(0, "rgba(255,200,200,0.25)");
                        gradient.addColorStop(1, "transparent");
                    } else if(currentFilter.id === 'vintage-cinema') {
                        gradient.addColorStop(0, "rgba(0,0,50,0.06)");
                        gradient.addColorStop(1, "rgba(50,30,0,0.06)");
                    } else if(currentFilter.id === 'aqua-marine') {
                        gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                        gradient.addColorStop(0, "rgba(0,255,255,0.2)");
                        gradient.addColorStop(1, "transparent");
                    } else if(currentFilter.id === 'golden-hour') {
                        gradient.addColorStop(0, "rgba(255,165,0,0.3)");
                        gradient.addColorStop(1, "transparent");
                    }
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                
                // Reset bộ dựng hình
                ctx.globalCompositeOperation = 'source-over';
                ctx.filter = "none";
                
                canvas.toBlob(function(blob) {
                    const fileUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = fileUrl;
                    link.download = `Sopcare_Ultra_${currentFilter.id}_${new Date().getTime()}.png`;
                    document.body.appendChild(link);
                    link.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(link);
                        URL.revokeObjectURL(fileUrl);
                        loadingToast.style.display = 'none';
                    }, 500);
                }, 'image/png', 1.0);
            };
        }

        window.addEventListener('DOMContentLoaded', () => {
            initCam();
            renderFilterBar();
        });
    </script>
</body>
</html>
