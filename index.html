<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopcare - Camera Tải Ảnh Tự Động</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .status-header { position: absolute; top: 10px; width: 100%; text-align: center; color: #ff007f; font-weight: bold; font-size: 16px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 5px #ff007f; }

        /* Lớp nền hiển thị lưới bố cục trên màn hình */
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        .active { display: block; }
        .line { position: absolute; background-color: rgba(255, 255, 255, 0.5); box-shadow: 0 0 3px rgba(0,0,0,0.6); }

        /* Bộ lọc màu sắc gradients giống hình mẫu */
        .ao-gradient {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(135, 206, 235, 0.35) 0%, rgba(255, 182, 193, 0.35) 50%, rgba(135, 206, 235, 0.35) 100%);
            mix-blend-mode: color; pointer-events: none;
        }

        /* Các chế độ bố cục */
        .spiral-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .grid-v1, .grid-v2 { width: 1px; height: 100%; top: 0; } .grid-v1 { left: 33.33%; } .grid-v2 { left: 66.66%; }
        .grid-h1, .grid-h2 { height: 1px; width: 100%; left: 0; } .grid-h1 { top: 33.33%; } .grid-h2 { top: 66.66%; }
        .frame-box { position: absolute; top: 15%; left: 10%; width: 80%; height: 55%; border: 2px solid rgba(255, 255, 255, 0.6); }
        .triangle-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .center-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; border: 2.5px dotted #ffeb3b; border-radius: 50%; }

        /* Thanh điều khiển */
        .controls-panel { position: absolute; bottom: 0; width: 100%; height: 110px; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding-bottom: 10px; z-index: 10; }
        .mode-selector { width: 100%; display: flex; justify-content: center; gap: 8px; overflow-x: auto; padding: 5px 10px; }
        .mode-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .mode-btn.selected { background: #ffeb3b; color: #000; font-weight: bold; }

        .action-area { width: 100%; display: flex; justify-content: space-around; align-items: center; }
        .footer-text { color: #ffeb3b; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        
        /* Hiệu ứng bấm nút chụp */
        .shutter-btn { width: 55px; height: 55px; border-radius: 50%; background-color: #fff; border: 4px solid rgba(255, 255, 255, 0.3); cursor: pointer; transition: transform 0.1s ease; }
        .shutter-btn:active { transform: scale(0.85); background: #ccc; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <div class="ao-gradient"></div>
        <div class="status-header">ÁO FILTER ACTIVATED</div>

        <div id="layout-spiral" class="overlay-layer active">
            <svg class="spiral-svg" viewBox="0 0 1000 1000">
                <path d="M500,500 m -300, 0 a 300,300 0 1,0 600,0 a 300,300 0 1,0 -600,0 M500,500 m -220, 0 a 220,220 0 1,0 440,0 a 220,220 0 1,0 -440,0 M500,500 m -140, 0 a 140,140 0 1,0 280,0 a 140,140 0 1,0 -280,0 M500,500 m -60, 0 a 60,60 0 1,0 120,0 a 60,60 0 1,0 -120,0" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
            </svg>
        </div>
        <div id="layout-grid" class="overlay-layer">
            <div class="line grid-v1"></div><div class="line grid-v2"></div>
            <div class="line grid-h1"></div><div class="line grid-h2"></div>
        </div>
        <div id="layout-framing" class="overlay-layer">
            <div class="frame-box"></div>
        </div>
        <div id="layout-triangle" class="overlay-layer">
            <svg class="triangle-svg">
                <polygon points="50%,15% 0%,50% 100%,50%" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
            </svg>
        </div>
        <div id="layout-center" class="overlay-layer">
            <div class="center-dot"></div>
        </div>

        <div class="controls-panel">
            <div class="mode-selector">
                <button class="mode-btn selected" onclick="changeLayout('spiral', this)">Ốc Sên</button>
                <button class="mode-btn" onclick="changeLayout('grid', this)">1/3 Grid</button>
                <button class="mode-btn" onclick="changeLayout('framing', this)">Khung</button>
                <button class="mode-btn" onclick="changeLayout('triangle', this)">Tam Giác</button>
                <button class="mode-btn" onclick="changeLayout('center', this)">Tâm Vàng</button>
            </div>
            <div class="action-area">
                <div class="footer-text">BỐ CỤC CHUẨN</div>
                <button class="shutter-btn" onclick="takePhoto()"></button>
            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false }).then(stream => { video.srcObject = stream; });
            }
        }

        function changeLayout(layoutName, btnElement) {
            document.querySelectorAll('.overlay-layer').forEach(layer => layer.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`layout-${layoutName}`).classList.add('active');
            btnElement.classList.add('selected');
        }

        // TỰ ĐỘNG KÍCH HOẠT LỆNH DOWNLOAD KHI CHỤP
        function takePhoto() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Ép filter màu nịnh mắt
            ctx.filter = "contrast(115%) saturate(135%) brightness(104%)";
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Thêm Gradient màu Áo chèn vào ảnh gốc
            ctx.globalCompositeOperation = 'overlay';
            let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, "rgba(135, 206, 235, 0.25)");
            gradient.addColorStop(0.5, "rgba(255, 182, 193, 0.25)");
            gradient.addColorStop(1, "rgba(135, 206, 235, 0.25)");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.globalCompositeOperation = 'source-over';
            ctx.filter = "none";
            
            // Chuyển canvas thành URL ảnh hình ảnh
            const imageURL = canvas.toDataURL('image/png');
            
            // Tạo thẻ <a> ngầm để kích hoạt popup tải file hệ thống ngay lập tức
            const a = document.createElement('a');
            a.href = imageURL;
            a.download = `Sopcare_AoFilter_${new Date().getTime()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        window.addEventListener('DOMContentLoaded', initCam);
    </script>
</body>
</html>
