<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quay Video & Sửa Phụ Đề V6</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #f5f5f5;
            text-align: center;
        }

        .status-badge {
            background-color: #ff6e00;
            color: white;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }

        .tip-text {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            background: #222;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px dashed #444;
            max-width: 500px;
        }

        .video-container {
            width: 100%;
            max-width: 600px;
            background-color: #1a1a1a;
            border-radius: 16px;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            aspect-ratio: 4/3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #playback {
            display: none;
        }

        .subtitle-overlay {
            position: absolute;
            bottom: 30px;
            left: 5%;
            width: 90%;
            text-align: center;
            z-index: 10;
        }

        .subtitle-text {
            background-color: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            display: inline-block;
            max-width: 100%;
            word-wrap: break-word;
            line-height: 1.4;
            border: 2px solid transparent;
            outline: none;
            cursor: text;
        }

        .subtitle-text:focus {
            border-color: #0084ff;
            background-color: rgba(0, 0, 0, 0.95);
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background-color: #222;
            color: white;
            border: 1px solid #444;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #333;
            transform: scale(1.02);
        }

        .btn-start { background-color: #0084ff; border-color: #0084ff; }
        .btn-record { background-color: #e50914; border-color: #e50914; }
        .btn-stop { background-color: #ffaa00; border-color: #ffaa00; color: #000; }
        
        .btn-download { background-color: #00a86b; border-color: #00a86b; }
        .btn-sub { background-color: #ff6e00; border-color: #ff6e00; }
    </style>
</head>
<body>

    <h2>QUAY & BIÊN TẬP VIDEO PHỤ ĐỀ V6 🎬</h2>
    <div id="status" class="status-badge">ĐANG XEM LẠI & CHỈNH SỬA</div>
    <div class="tip-text" id="tip">💡 Mẹo: Bật camera ➡️ Quay video ➡️ Sửa phụ đề lỗi ➡️ Tải file về máy!</div>

    <div class="video-container">
        <video id="preview" autoplay playsinline muted></video>
        <video id="playback" controls playsinline></video>
        <div class="subtitle-overlay">
            <span id="subtitle" class="subtitle-text" contenteditable="true" onfocus="pauseAudioAndRec()" onblur="saveEditedText()">Bật camera để bắt đầu...</span>
        </div>
    </div>

    <div class="controls">
        <button id="btn-open" class="btn btn-start" onclick="openCamera()">Mở Camera 📷</button>
        <button id="btn-switch" class="btn" onclick="switchCamera()" style="display: none;">Đổi Camera 🔄</button>
        <button id="btn-start-rec" class="btn btn-record" onclick="startRecording()" style="display: none;">Bắt Đầu Quay 🔴</button>
        <button id="btn-stop-rec" class="btn btn-stop" onclick="stopRecording()" style="display: none;">Xong, Xem Lại & Sửa ⏹️</button>
        
        <button id="btn-download" class="btn btn-download" onclick="triggerVideoDownload()" style="display: none;">Tải Video Về 🎬</button>
        <button id="btn-download-sub" class="btn btn-sub" onclick="triggerSubDownload()" style="display: none;">Tải Phụ Đề (.srt) 📑</button>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let streamObj = null;
        let recognition;
        let isUserEditing = false;
        let currentFacingMode = 'user';

        let startTime;
        let srtRecords = [];
        let currentSubIndex = 0;
        let finalVideoBlob = null; // Lưu trữ blob video toàn cục

        const preview = document.getElementById('preview');
        const playback = document.getElementById('playback');
        const subtitleTxt = document.getElementById('subtitle');
        const statusBadge = document.getElementById('status');
        const tipTxt = document.getElementById('tip');
        
        const btnOpen = document.getElementById('btn-open');
        const btnSwitch = document.getElementById('btn-switch');
        const btnStartRec = document.getElementById('btn-start-rec');
        const btnStopRec = document.getElementById('btn-stop-rec');
        const btnDownload = document.getElementById('btn-download');
        const btnDownloadSub = document.getElementById('btn-download-sub');

        async function openCamera() {
            if (streamObj) streamObj.getTracks().forEach(track => track.stop());
            preview.style.display = 'block';
            playback.style.display = 'none';
            statusBadge.style.display = 'none';

            try {
                streamObj = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode },
                    audio: true
                });
                preview.srcObject = streamObj;
                btnOpen.style.display = 'none';
                btnSwitch.style.display = 'inline-block';
                btnStartRec.style.display = 'inline-block';
                
                if (!recognition) initSpeechRecognition();
            } catch (err) {
                alert("Không thể khởi động Camera/Microphone!");
            }
        }

        async function switchCamera() {
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            await openCamera();
        }

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'vi-VN'; 

            recognition.onresult = function(event) {
                if (isUserEditing || (mediaRecorder && mediaRecorder.state !== "recording")) return;

                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                let text = finalTranscript || interimTranscript;
                if (text.trim() !== "") {
                    subtitleTxt.innerText = text;

                    if (finalTranscript) {
                        const currentTime = (Date.now() - startTime) / 1000;
                        const startPoint = srtRecords.length > 0 ? srtRecords[srtRecords.length - 1].endRaw : 0;
                        
                        srtRecords.push({
                            id: currentSubIndex++,
                            startRaw: startPoint,
                            endRaw: currentTime,
                            text: finalTranscript.trim()
                        });
                    }
                }
            };

            recognition.onend = function() {
                if (mediaRecorder && mediaRecorder.state === "recording" && !isUserEditing) {
                    try { recognition.start(); } catch(e) {}
                }
            };
        }

        function pauseAudioAndRec() {
            isUserEditing = true;
            if (recognition) try { recognition.stop(); } catch(e) {}
            if (!playback.paused) playback.pause();
        }

        function saveEditedText() {
            isUserEditing = false;
            const newText = subtitleTxt.innerText.trim();
            const videoTime = playback.currentTime;

            if (playback.style.display === 'block' && srtRecords.length > 0) {
                let matchedSub = srtRecords.find(sub => videoTime >= sub.startRaw && videoTime <= sub.endRaw);
                if (!matchedSub) {
                    matchedSub = srtRecords.reduce((prev, curr) => 
                        Math.abs(curr.startRaw - videoTime) < Math.abs(prev.startRaw - videoTime) ? curr : prev
                    );
                }
                if (matchedSub) matchedSub.text = newText;
            }

            if (mediaRecorder && mediaRecorder.state === "recording" && recognition) {
                try { recognition.start(); } catch(e) {}
            }
        }

        function startRecording() {
            recordedChunks = [];
            srtRecords = [];
            currentSubIndex = 0;
            startTime = Date.now();
            finalVideoBlob = null;
            
            subtitleTxt.innerText = "Bắt đầu nói...";
            btnDownload.style.display = 'none';
            btnDownloadSub.style.display = 'none';
            btnSwitch.style.display = 'none';

            let options = {};
            if (MediaRecorder.isTypeSupported('video/mp4')) {
                options = { mimeType: 'video/mp4' };
            } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
                options = { mimeType: 'video/webm;codecs=vp9' };
            }
            
            try {
                mediaRecorder = new MediaRecorder(streamObj, options);
            } catch(e) {
                mediaRecorder = new MediaRecorder(streamObj);
            }
            
            mediaRecorder.ondataavailable = function(e) {
                if (e.data && e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = function() {
                const totalDuration = (Date.now() - startTime) / 1000;
                const startPoint = srtRecords.length > 0 ? srtRecords[srtRecords.length - 1].endRaw : 0;
                if (subtitleTxt.innerText !== "Bắt đầu nói..." && startPoint < totalDuration) {
                    srtRecords.push({
                        id: currentSubIndex++,
                        startRaw: startPoint,
                        endRaw: totalDuration,
                        text: subtitleTxt.innerText.trim()
                    });
                }

                preview.style.display = 'none';
                playback.style.display = 'block';
                statusBadge.style.display = 'inline-block';
                tipTxt.innerHTML = "🎯 <b>Chế độ biên tập:</b> Sửa chữ trực tiếp trên màn hình, sau đó bấm nút lưu phía dưới.";

                finalVideoBlob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                playback.src = URL.createObjectURL(finalVideoBlob);
                
                playback.ontimeupdate = function() {
                    if (isUserEditing) return;
                    const checkTime = playback.currentTime;
                    const activeSub = srtRecords.find(sub => checkTime >= sub.startRaw && checkTime <= sub.endRaw);
                    subtitleTxt.innerText = activeSub ? activeSub.text : "...";
                };

                btnDownload.style.display = 'inline-block';
                btnDownloadSub.style.display = 'inline-block';
                btnSwitch.style.display = 'inline-block';
                btnOpen.style.display = 'inline-block';
                btnOpen.innerText = "Quay Lại Lớp Quay 📷";
            };

            mediaRecorder.start();
            if (recognition && !isUserEditing) { try { recognition.start(); } catch(e) {} }

            btnStartRec.style.display = 'none';
            btnStopRec.style.display = 'inline-block';
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            if (recognition) { try { recognition.stop(); } catch(e) {} }
            btnStartRec.style.display = 'inline-block';
            btnStopRec.style.display = 'none';
        }

        // PHƯƠNG PHÁP TẢI DỰ PHÒNG CƯỠNG BỨC (FORCED DOWNLOAD) - KHÔNG LO LỖI TRÌNH DUYỆT ChẶN
        function triggerVideoDownload() {
            if (!finalVideoBlob) return;
            const extension = mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
            
            const a = document.createElement('a');
            a.href = URL.createObjectURL(finalVideoBlob);
            a.download = `video_export.${extension}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function triggerSubDownload() {
            let srtContent = '';
            srtRecords.forEach((item, index) => {
                const startFormatted = formatTimeSRT(item.startRaw);
                const endFormatted = formatTimeSRT(item.endRaw);
                srtContent += `${index + 1}\n${startFormatted} --> ${endFormatted}\n${item.text}\n\n`;
            });
            
            const srtBlob = new Blob([srtContent], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(srtBlob);
            a.download = 'phude_chinhxac.srt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function formatTimeSRT(seconds) {
            const date = new Date(null);
            date.setSeconds(seconds);
            const ms = Math.floor((seconds % 1) * 1000).toString().padStart(3, '0');
            return date.toISOString().substr(11, 8) + ',' + ms;
        }
    </script>
</body>
</html>
