<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Quay Video Đóng Gói Phụ Đề</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #f5f5f5;
            text-align: center;
        }

        .tip-text {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            background: #222;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px dashed #444;
        }

        /* Khung chứa camera/video */
        .video-container {
            width: 100%;
            max-width: 600px;
            background-color: #1a1a1a;
            border-radius: 16px;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            aspect-ratio: 4/3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Vùng phủ phụ đề hiển thị cho người dùng xem lúc quay */
        .subtitle-overlay {
            position: absolute;
            bottom: 30px;
            left: 5%;
            width: 90%;
            text-align: center;
            z-index: 10;
        }

        .subtitle-text {
            background-color: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            display: inline-block;
            max-width: 100%;
            word-wrap: break-word;
            line-height: 1.4;
            border: 2px solid transparent;
            outline: none;
            cursor: text;
            transition: all 0.2s ease;
        }

        .subtitle-text:focus {
            border-color: #0084ff;
            background-color: rgba(0, 0, 0, 0.95);
            box-shadow: 0 0 10px rgba(0, 132, 255, 0.5);
        }

        /* Hệ thống nút bấm */
        .controls {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background-color: #222;
            color: white;
            border: 1px solid #444;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #333;
            transform: scale(1.02);
        }

        .btn-start { background-color: #0084ff; border-color: #0084ff; }
        .btn-start:hover { background-color: #006cd2; }

        .btn-record { background-color: #e50914; border-color: #e50914; }
        .btn-record:hover { background-color: #b80710; }

        .btn-stop { background-color: #555; border-color: #666; }

        .btn-download { background-color: #00a86b; border-color: #00a86b; text-decoration: none; display: inline-block; }
        .btn-download:hover { background-color: #008554; }
    </style>
</head>
<body>

    <h2>QUAY VIDEO + IN CHỮ PHỤ ĐỀ 🎙️</h2>
    <div class="tip-text">💡 Bạn có thể bấm thẳng vào phụ đề để sửa lại chữ lỗi trước khi bấm dừng quay!</div>

    <div class="video-container">
        <video id="preview" autoplay playsinline muted></video>
        <div class="subtitle-overlay">
            <span id="subtitle" class="subtitle-text" contenteditable="true" onfocus="pauseRecognition()" onblur="resumeRecognition()">Phụ đề tự động xuất hiện tại đây...</span>
        </div>
    </div>

    <div class="controls">
        <button id="btn-open" class="btn btn-start" onclick="openCamera()">Mở Camera 📷</button>
        <button id="btn-start-rec" class="btn btn-record" onclick="startRecording()" style="display: none;">Bắt Đầu Quay 🔴</button>
        <button id="btn-stop-rec" class="btn btn-stop" onclick="stopRecording()" style="display: none;">Dừng Quay & Lưu ⏹️</button>
        <a id="btn-download" class="btn btn-download" style="display: none;">Tải Video Có Chữ Về Máy 💾</a>
    </div>

    <canvas id="record-canvas" style="display: none;"></canvas>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let streamObj = null;
        let recognition;
        let isUserEditing = false;
        let canvasRenderLoop;

        const preview = document.getElementById('preview');
        const subtitleTxt = document.getElementById('subtitle');
        const recordCanvas = document.getElementById('record-canvas');
        const canvasCtx = recordCanvas.getContext('2d');
        
        const btnOpen = document.getElementById('btn-open');
        const btnStartRec = document.getElementById('btn-start-rec');
        const btnStopRec = document.getElementById('btn-stop-rec');
        const btnDownload = document.getElementById('btn-download');

        async function openCamera() {
            try {
                streamObj = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: 'user' },
                    audio: true
                });
                
                preview.srcObject = streamObj;
                btnOpen.style.display = 'none';
                btnStartRec.style.display = 'inline-block';
                
                initSpeechRecognition();
            } catch (err) {
                alert("Không thể truy cập Camera/Microphone!");
                console.error(err);
            }
        }

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                subtitleTxt.innerText = "Trình duyệt không hỗ trợ nhận diện (Hãy dùng Google Chrome).";
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'vi-VN'; 

            recognition.onresult = function(event) {
                if (isUserEditing) return;

                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                let currentText = finalTranscript || interimTranscript;
                if(currentText.trim() !== "") {
                    subtitleTxt.innerText = currentText;
                }
            };

            recognition.onend = function() {
                if (mediaRecorder && mediaRecorder.state === "recording" && !isUserEditing) {
                    recognition.start();
                }
            };
        }

        function pauseRecognition() {
            isUserEditing = true;
            if (recognition) recognition.stop();
        }

        function resumeRecognition() {
            isUserEditing = false;
            if (mediaRecorder && mediaRecorder.state === "recording" && recognition) {
                try { recognition.start(); } catch(e) {}
            }
        }

        // CHỨC NĂNG VẼ CAMERA + PHỤ ĐỀ LÊN CANVAS ĐỂ ĐÓNG GÓI VIDEO
        function startCanvasRender() {
            recordCanvas.width = 640;
            recordCanvas.height = 480;

            function drawFrame() {
                if (!mediaRecorder || mediaRecorder.state !== "recording") return;

                // 1. Vẽ hình ảnh camera gốc lên nền canvas
                canvasCtx.drawImage(preview, 0, 0, recordCanvas.width, recordCanvas.height);

                // 2. Thiết kế định dạng và vẽ phụ đề đè lên canvas
                const text = subtitleTxt.innerText;
                canvasCtx.font = "bold 20px Arial, sans-serif";
                canvasCtx.textAlign = "center";
                
                // Đo độ rộng chữ để vẽ khung nền đen phía sau chữ cho dễ đọc
                const textWidth = canvasCtx.measureText(text).width;
                
                canvasCtx.fillStyle = "rgba(0, 0, 0, 0.75)";
                // Vẽ hộp nền đen che chữ
                canvasCtx.fillRect((recordCanvas.width - textWidth - 30) / 2, recordCanvas.height - 65, textWidth + 30, 35);

                // Vẽ chữ phụ đề màu trắng lên trên hộp đen
                canvasCtx.fillStyle = "#ffffff";
                canvasCtx.fillText(text, recordCanvas.width / 2, recordCanvas.height - 40);

                // Lặp lại liên tục 30 khung hình trên giây để tạo chuyển động mượt mà
                canvasRenderLoop = requestAnimationFrame(drawFrame);
            }
            
            drawFrame();
        }

        // BẮT ĐẦU QUAY VIDEO TỪ CANVAS ĐÃ TRỘN CHỮ
        function startRecording() {
            recordedChunks = [];
            subtitleTxt.innerText = "Bắt đầu nói hoặc chạm vào đây để sửa...";
            btnDownload.style.display = 'none';

            // Kích hoạt vòng lặp xử lý hình ảnh đóng gói
            startCanvasRender();

            // Lấy luồng video kết hợp từ Canvas (30fps)
            const canvasStream = recordCanvas.captureStream(30);
            
            // Lấy thêm luồng âm thanh từ microphone gốc để ghép vào video canvas
            const audioTracks = streamObj.getAudioTracks();
            if (audioTracks.length > 0) {
                canvasStream.addTrack(audioTracks[0]);
            }

            // Tiến hành ghi lại luồng đã trộn
            mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm;codecs=vp9' });
            
            mediaRecorder.ondataavailable = function(e) {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = function() {
                cancelAnimationFrame(canvasRenderLoop);
                
                // Đóng gói dữ liệu thành file video hoàn chỉnh tải về máy
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                
                // Thiết lập link tải về cho nút bấm
                btnDownload.href = url;
                btnDownload.download = 'video_sub_hoan_chinh.mp4';
                btnDownload.style.display = 'inline-block';
            };

            mediaRecorder.start();

            if (recognition && !isUserEditing) recognition.start();

            btnStartRec.style.display = 'none';
            btnStopRec.style.display = 'inline-block';
        }

        function stopRecording() {
            if (mediaRecorder) mediaRecorder.stop();
            if (recognition) recognition.stop();
            
            btnStartRec.style.display = 'inline-block';
            btnStopRec.style.display = 'none';
        }
    </script>
</body>
</html>
