<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopcare - Camera Bố Cục Chuẩn & Auto Tải Ảnh</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Open Sans', Arial, sans-serif; }
        
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Tiêu đề phát sáng hồng neon rực rỡ góc trên */
        .status-header { position: absolute; top: 12px; width: 100%; text-align: center; color: #ff007f; font-weight: bold; font-size: 16px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 8px #ff007f; }

        /* Phủ lớp màu Gradients Ảo trực tiếp lên Camera màn hình */
        .ao-gradient {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(135, 206, 235, 0.35) 0%, rgba(255, 182, 193, 0.35) 50%, rgba(135, 206, 235, 0.35) 100%);
            mix-blend-mode: color; pointer-events: none; z-index: 2;
        }

        /* Lớp hiển thị lưới bố cục */
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 3; }
        .active { display: block; }
        .line { position: absolute; background-color: rgba(255, 255, 255, 0.6); box-shadow: 0 0 4px rgba(0,0,0,0.7); }

        /* 1. Lưới xoắn ốc (Ốc Sên) */
        .spiral-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* 2. Lưới 1/3 Grid */
        .grid-v1, .grid-v2 { width: 1.5px; height: 100%; top: 0; } .grid-v1 { left: 33.33%; } .grid-v2 { left: 66.66%; }
        .grid-h1, .grid-h2 { height: 1.5px; width: 100%; left: 0; } .grid-h1 { top: 33.33%; } .grid-h2 { top: 66.66%; }
        /* 3. Bố cục Khung hình (Framing lồng nhau) */
        .frame-outer { position: absolute; top: 15%; left: 10%; width: 80%; height: 55%; border: 2px solid rgba(255, 255, 255, 0.7); box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }
        .frame-inner { position: absolute; top: 70%; left: 44%; width: 12%; height: 15%; border: 1.5px solid rgba(255, 255, 255, 0.8); }
        /* 4. Bố cục Tam giác cân */
        .triangle-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* 5. Đường đôi song song thẳng đứng */
        .double-v1, .double-v2 { width: 1.5px; height: 100%; top: 0; } .double-v1 { left: 45%; } .double-v2 { left: 55%; }
        /* 6. Đường chéo dốc sườn núi */
        .diagonal-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Panel điều khiển phía dưới */
        .controls-panel { position: absolute; bottom: 0; width: 100%; height: 125px; background: rgba(0,0,0,0.75); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding-bottom: 12px; z-index: 10; }
        
        /* Menu cuộn chọn bố cục mượt mà */
        .mode-selector { width: 100%; display: flex; justify-content: flex-start; gap: 8px; overflow-x: auto; padding: 6px 15px; scrollbar-width: none; }
        .mode-selector::-webkit-scrollbar { display: none; }
        .mode-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 7px 14px; border-radius: 18px; font-size: 11px; cursor: pointer; text-transform: uppercase; white-space: nowrap; font-weight: bold; transition: all 0.2s; }
        .mode-btn.selected { background: #ffeb3b; color: #000; box-shadow: 0 0 8px #ffeb3b; }

        /* Khu vực nút chụp */
        .action-area { width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; }
        .footer-text { color: #ffeb3b; font-weight: bold; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .shutter-btn { width: 58px; height: 58px; border-radius: 50%; background-color: #fff; border: 4px solid rgba(255, 255, 255, 0.35); cursor: pointer; transition: transform 0.1s ease; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .shutter-btn:active { transform: scale(0.85); background: #ddd; }

        /* THÔNG BÁO POPUP ĐANG XỬ LÝ TẢI */
        .loading-toast { display: none; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: #ffeb3b; padding: 15px 25px; border-radius: 25px; font-weight: bold; font-size: 14px; z-index: 30; border: 1px solid #ffeb3b; text-align: center; box-shadow: 0 0 15px rgba(0,0,0,0.5); }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <div class="ao-gradient"></div>
        <div class="status-header">ÁO FILTER ACTIVATED</div>

        <div id="layout-spiral" class="overlay-layer active">
            <svg class="spiral-svg" viewBox="0 0 1000 1000">
                <path d="M500,500 m -300, 0 a 300,300 0 1,0 600,0 a 300,300 0 1,0 -600,0 M500,500 m -220, 0 a 220,220 0 1,0 440,0 a 220,220 0 1,0 -440,0 M500,500 m -140, 0 a 140,140 0 1,0 280,0 a 140,140 0 1,0 -280,0 M500,500 m -60, 0 a 60,60 0 1,0 120,0 a 60,60 0 1,0 -120,0" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>
            </svg>
        </div>

        <div id="layout-grid" class="overlay-layer">
            <div class="line grid-v1"></div><div class="line grid-v2"></div>
            <div class="line grid-h1"></div><div class="line grid-h2"></div>
        </div>

        <div id="layout-framing" class="overlay-layer">
            <div class="frame-outer"></div>
            <div class="frame-inner"></div>
        </div>

        <div id="layout-triangle" class="overlay-layer">
            <svg class="triangle-svg">
                <line x1="0" y1="50%" x2="100%" y2="50%" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
                <polygon points="50%,38% 5%,75% 95%,75%" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
            </svg>
        </div>

        <div id="layout-double" class="overlay-layer">
            <div class="line double-v1"></div><div class="line double-v2"></div>
        </div>

        <div id="layout-diagonal" class="overlay-layer">
            <svg class="diagonal-svg">
                <line x1="0" y1="80%" x2="100%" y2="45%" stroke="rgba(255,255,255,0.75)" stroke-width="2.5"/>
            </svg>
        </div>

        <div class="controls-panel">
            <div class="mode-selector">
                <button class="mode-btn selected" onclick="changeLayout('spiral', this)">Ốc Sên</button>
                <button class="mode-btn" onclick="changeLayout('grid', this)">1/3 Grid</button>
                <button class="mode-btn" onclick="changeLayout('framing', this)">Khung Hình</button>
                <button class="mode-btn" onclick="changeLayout('triangle', this)">Tam Giác</button>
                <button class="mode-btn" onclick="changeLayout('double', this)">Đường Đôi</button>
                <button class="mode-btn" onclick="changeLayout('diagonal', this)">Đường Chéo</button>
            </div>
            <div class="action-area">
                <div class="footer-text">BỐ CỤC CHUẨN</div>
                <button class="shutter-btn" onclick="takePhoto()"></button>
            </div>
        </div>
    </div>

    <div id="loadingToast" class="loading-toast">📸 ĐANG LƯU ẢNH...<br>Ảnh tự động tải xuống máy bạn!</div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const loadingToast = document.getElementById('loadingToast');

        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false }).then(stream => { video.srcObject = stream; });
            }
        }

        function changeLayout(layoutName, btnElement) {
            document.querySelectorAll('.overlay-layer').forEach(layer => layer.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`layout-${layoutName}`).classList.add('active');
            btnElement.classList.add('selected');
        }

        // CHỤP - ÉP MÀU HOÀNG HÔN ÁO - TỰ ĐỘNG TẢI TRỰC TIẾP KHÔNG CẦN ẤN GIỮ
        function takePhoto() {
            loadingToast.style.display = 'block';
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Xử lý bộ lọc màu sắc nịnh mắt căng nét giống hệt app
            ctx.filter = "contrast(116%) saturate(138%) brightness(103%)";
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Ép thêm lớp phủ màu hoàng hôn hồng xanh hoàng gia lên ảnh
            ctx.globalCompositeOperation = 'overlay';
            let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, "rgba(135, 206, 235, 0.25)");
            gradient.addColorStop(0.5, "rgba(255, 182, 193, 0.25)");
            gradient.addColorStop(1, "rgba(135, 206, 235, 0.25)");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.globalCompositeOperation = 'source-over';
            ctx.filter = "none";
            
            // Tối ưu hóa cơ chế ép file trực tiếp để trình duyệt bắt buộc phải tải về
            try {
                canvas.toBlob(function(blob) {
                    const fileUrl = URL.createObjectURL(blob);
                    const downloadLink = document.createElement('a');
                    downloadLink.href = fileUrl;
                    downloadLink.download = `Sopcare_Professional_${new Date().getTime()}.png`;
                    
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    
                    // Dọn dẹp bộ nhớ ngầm
                    setTimeout(() => {
                        document.body.removeChild(downloadLink);
                        URL.revokeObjectURL(fileUrl);
                        loadingToast.style.display = 'none';
                    }, 600);
                }, 'image/png', 1.0);
            } catch (e) {
                // Phương án dự phòng nếu trình duyệt quá cũ chặn Blob
                const imageURL = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = imageURL;
                a.download = `Sopcare_Professional_${new Date().getTime()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                loadingToast.style.display = 'none';
            }
        }

        window.addEventListener('DOMContentLoaded', initCam);
    </script>
</body>
</html>
