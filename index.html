<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopcare - 20 Anime Ultra Filters</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', Arial, sans-serif; }
        
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Tiêu đề Neon mộng mơ */
        .status-header { position: absolute; top: 15px; width: 100%; text-align: center; color: #fff; font-weight: 900; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00ff; }
        .sub-header { position: absolute; top: 38px; width: 100%; text-align: center; color: #ffeb3b; font-weight: bold; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 5px #ffeb3b; }

        /* Lưới căn góc Ốc Sên phát sáng */
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 3; }
        .active { display: block; }
        .spiral-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; filter: drop-shadow(0px 0px 3px rgba(255,255,255,0.6)); }

        /* Panel điều khiển camera phía dưới */
        .controls-panel { position: absolute; bottom: 0; width: 100%; height: 125px; background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.75)); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding-bottom: 12px; z-index: 10; }
        
        .action-area { width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; }
        .footer-text { color: #00ffff; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; text-shadow: 0 0 5px #00ffff; }
        .shutter-btn { width: 62px; height: 62px; border-radius: 50%; background-color: #ffeb3b; border: 5px solid rgba(255, 235, 59, 0.3); cursor: pointer; box-shadow: 0 0 15px rgba(255,235,59,0.5); font-weight: bold; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; color: #000; }

        /* GIAO DIỆN CHỈNH 20 SIÊU BỘ LỌC ANIME SAU KHI CHỤP */
        .preview-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #020202; z-index: 20; flex-direction: column; justify-content: space-between; align-items: center; padding: 15px 0; }
        .preview-box { width: 100%; height: 50%; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; background: #090909; }
        
        /* Khung chứa ảnh và lớp màu anime */
        .image-wrapper { position: relative; max-width: 90%; max-height: 100%; display: flex; justify-content: center; align-items: center; border-radius: 12px; overflow: hidden; border: 1px solid #222; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        #previewImage { width: 100%; height: 100%; object-fit: contain; transition: filter 0.1s ease; }
        .gradient-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; mix-blend-mode: overlay; transition: background 0.1s ease; }

        /* Thanh chứa 20 Bộ lọc cuộn ngang */
        .filter-bar { width: 100%; display: flex; gap: 10px; overflow-x: auto; padding: 10px; background: #0c0c0c; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-item { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 70px; cursor: pointer; }
        .filter-thumb { width: 50px; height: 50px; border-radius: 8px; border: 2px solid #252525; overflow: hidden; transition: all 0.15s; background: #151515; }
        .filter-item.active .filter-thumb { border-color: #ffeb3b; box-shadow: 0 0 10px rgba(255,235,59,0.5); transform: scale(1.05); }
        .filter-name { color: #777; font-size: 9px; text-align: center; white-space: nowrap; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-item.active .filter-name { color: #ffeb3b; }

        /* Nút lưu ảnh */
        .bottom-actions { width: 100%; display: flex; justify-content: center; gap: 12px; padding: 5px 15px; }
        .action-btn { padding: 10px 25px; border-radius: 20px; font-weight: 800; font-size: 12px; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-cancel { background: #161616; color: #888; border: 1px solid #252525; }
        .btn-download { background: linear-gradient(90deg, #ff00ff, #ffeb3b); color: #000; box-shadow: 0 0 15px rgba(255,0,255,0.4); }

        .loading-toast { display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); color: #ffeb3b; padding: 12px 25px; border-radius: 25px; font-weight: bold; font-size: 12px; z-index: 40; border: 1px solid #ffeb3b; letter-spacing: 1px; text-align: center; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="camera-container" id="cameraView">
        <video id="video" autoplay playsinline></video>
        <div class="status-header">SOPCARE ANIME</div>
        <div class="sub-header">20 ULTRA-FILTERS ACTIVATED</div>

        <div id="layout-spiral" class="overlay-layer active">
            <svg class="spiral-svg" viewBox="0 0 1000 1000">
                <path d="M500,500 m -300, 0 a 300,300 0 1,0 600,0 a 300,300 0 1,0 -600,0 M500,500 m -220, 0 a 220,220 0 1,0 440,0 a 220,220 0 1,0 -440,0 M500,500 m -140, 0 a 140,140 0 1,0 280,0 a 140,140 0 1,0 -280,0 M500,500 m -60, 0 a 60,60 0 1,0 120,0 a 60,60 0 1,0 -120,0" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>
            </svg>
        </div>

        <div class="controls-panel">
            <div class="action-area">
                <div class="footer-text">TRONG TRẺO • MỘNG MƠ</div>
                <button class="shutter-btn" onclick="takePhoto()">Chụp</button>
            </div>
        </div>
    </div>

    <div class="preview-container" id="previewView">
        <div class="status-header" style="color: #ffeb3b; text-shadow: 0 0 10px #ffeb3b;">ANIME DEVELOPING</div>
        
        <div class="preview-box">
            <div class="image-wrapper">
                <img id="previewImage" alt="Preview ảnh chụp">
                <div class="gradient-overlay" id="gradientOverlay"></div>
            </div>
        </div>

        <div class="filter-bar" id="filterBar"></div>

        <div class="bottom-actions">
            <button class="action-btn btn-cancel" onclick="cancelPreview()">Hủy / Chụp lại</button>
            <button class="action-btn btn-download" onclick="downloadFinalImage()">Lưu Về Máy</button>
        </div>
    </div>

    <div id="loadingToast" class="loading-toast">👽 ĐANG CHUYỂN THẾ GIỚI ANIME...</div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cameraView = document.getElementById('cameraView');
        const previewView = document.getElementById('previewView');
        const previewImage = document.getElementById('previewImage');
        const gradientOverlay = document.getElementById('gradientOverlay');
        const filterBar = document.getElementById('filterBar');
        const loadingToast = document.getElementById('loadingToast');

        let originalImageDataUrl = '';
        let selectedFilterId = 'normal';

        // CHÍNH THỨC KHỞI TẠO 20 SIÊU BỘ LỌC ANIME ĐẸP, CÓ GU, KHÔNG LỐ
        const filtersConfig = [
            { id: 'normal', name: 'Màu Gốc', filterCSS: 'none', blend: 'none', gradStyle: '' },
            { id: 'sky-pro', name: 'Trời Xanh', filterCSS: 'contrast(106%) saturate(145%) brightness(103%) hue-rotate(5deg)', blend: 'overlay', gradStyle: 'linear-gradient(to top, rgba(135,206,235,0.1), transparent)' },
            { id: 'shinkai-vibes', name: 'Mộng Mơ', filterCSS: 'brightness(102%) contrast(108%) saturate(140%) sepia(3%)', blend: 'overlay', gradStyle: 'linear-gradient(135deg, rgba(255,200,220,0.15), rgba(135,206,255,0.1))' },
            { id: 'peach-anime', name: 'Đào Tiên', filterCSS: 'brightness(104%) contrast(102%) saturate(118%) hue-rotate(-3deg)', blend: 'overlay', gradStyle: 'linear-gradient(135deg, rgba(255,182,193,0.12), rgba(255,225,200,0.08))' },
            { id: 'ghibli-summer', name: 'Mùa Hè', filterCSS: 'contrast(106%) saturate(135%) hue-rotate(12deg) brightness(101%)', blend: 'none', gradStyle: '' },
            { id: 'nostalgia', name: 'Hoài Niệm', filterCSS: 'contrast(95%) sepia(18%) saturate(102%) brightness(104%)', blend: 'overlay', gradStyle: 'linear-gradient(45deg, rgba(210,105,30,0.06), rgba(255,165,0,0.03))' },
            { id: 'clear-clean', name: 'Trong Trẻo', filterCSS: 'contrast(108%) saturate(115%) brightness(105%) hue-rotate(2deg)', blend: 'none', gradStyle: '' },
            { id: 'candy-pastel', name: 'Candy', filterCSS: 'brightness(102%) contrast(96%) saturate(125%) hue-rotate(-10deg)', blend: 'overlay', gradStyle: 'linear-gradient(to bottom, rgba(200,255,200,0.08), rgba(255,200,255,0.08))' },
            { id: 'dreamy-pink', name: 'Hồng Thơ', filterCSS: 'brightness(102%) contrast(98%) saturate(115%) sepia(5%) hue-rotate(320deg)', blend: 'color', gradStyle: 'linear-gradient(to right, rgba(255,182,193,0.15), rgba(255,200,230,0.1))' },
            { id: 'fresh-forest', name: 'Rừng Xanh', filterCSS: 'contrast(105%) saturate(155%) hue-rotate(15deg) brightness(98%)', blend: 'none', gradStyle: '' },
            { id: 'golden-sun', name: 'Nắng Ấm', filterCSS: 'contrast(102%) saturate(125%) brightness(102%) sepia(10%)', blend: 'overlay', gradStyle: 'linear-gradient(135deg, rgba(255,215,0,0.18), transparent)' },
            { id: 'cyan-orange', name: 'Teal & Orange', filterCSS: 'contrast(115%) saturate(115%) hue-rotate(-10deg) brightness(96%)', blend: 'overlay', gradStyle: 'linear-gradient(to right, rgba(0,128,128,0.12), rgba(255,165,0,0.05))' },
            { id: 'urban-light', name: 'Ánh Phố', filterCSS: 'brightness(103%) contrast(110%) saturate(125%) hue-rotate(50deg)', blend: 'color-burn', gradStyle: 'linear-gradient(to top, rgba(200,255,255,0.1), transparent)' },
            { id: 'indie-vibe', name: 'Indie', filterCSS: 'contrast(112%) brightness(98%) saturate(135%) sepia(12%) hue-rotate(15deg)', blend: 'none', gradStyle: '' },
            { id: 'deep-moody', name: 'Noir Moody', filterCSS: 'grayscale(100%) contrast(140%) brightness(92%) sepia(20%)', blend: 'none', gradStyle: '' },
            { id: 'icy-cold', name: 'Lạnh Giá', filterCSS: 'brightness(105%) contrast(115%) saturate(80%) sepia(10%) hue-rotate(150deg)', blend: 'color', gradStyle: 'linear-gradient(to left, rgba(0,191,255,0.15), transparent)' },
            { id: 'sweet-cream', name: 'Creamy', filterCSS: 'brightness(108%) contrast(92%) saturate(108%) sepia(5%)', blend: 'overlay', gradStyle: 'linear-gradient(to bottom, rgba(255,250,240,0.2), rgba(255,239,213,0.1))' },
            { id: 'vintage-tv', name: 'Màu Phim', filterCSS: 'contrast(92%) sepia(28%) saturate(100%) brightness(96%) hue-rotate(-5deg)', blend: 'none', gradStyle: '' },
            { id: 'purple-dream', name: 'Tím Thơ', filterCSS: 'brightness(104%) contrast(106%) saturate(120%) sepia(5%) hue-rotate(240deg)', blend: 'overlay', gradStyle: 'linear-gradient(135deg, rgba(200,160,255,0.15), rgba(135,206,235,0.08))' },
            { id: 'bw-art', name: 'Mono Art', filterCSS: 'grayscale(100%) contrast(165%) brightness(88%)', blend: 'none', gradStyle: '' }
        ];

        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false }).then(stream => { video.srcObject = stream; });
            }
        }

        // Tự động render 20 bộ lọc ra thanh điều khiển
        function renderFilterBar() {
            filterBar.innerHTML = '';
            filtersConfig.forEach(f => {
                const item = document.createElement('div');
                item.className = `filter-item ${f.id === selectedFilterId ? 'active' : ''}`;
                item.onclick = () => selectFilter(f.id);

                let thumbStyle = `filter: ${f.filterCSS};`;
                if(f.gradStyle) {
                    thumbStyle += `background: ${f.gradStyle};`;
                } else {
                    thumbStyle += `background: linear-gradient(to bottom, #444, #111);`;
                }

                item.innerHTML = `
                    <div class="filter-thumb" style="${thumbStyle}"></div>
                    <div class="filter-name">${f.name}</div>
                `;
                filterBar.appendChild(item);
            });
        }

        function selectFilter(filterId) {
            selectedFilterId = filterId;
            const targetFilter = filtersConfig.find(f => f.id === filterId);
            
            // Áp hiệu ứng CSS mạnh lên ảnh thẻ <img> xem trước
            previewImage.style.filter = targetFilter.filterCSS;
            
            // Nếu là bộ lọc dùng Gradients overlay thì áp mix-blend-mode
            if(targetFilter.gradStyle) {
                gradientOverlay.style.background = targetFilter.gradStyle;
                gradientOverlay.style.mixBlendMode = targetFilter.blend;
            } else {
                gradientOverlay.style.background = 'none';
            }

            renderFilterBar();
        }

        function takePhoto() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Vẽ ảnh mộc từ camera lên canvas ngầm
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            originalImageDataUrl = canvas.toDataURL('image/png');
            
            // Chuyển giao diện sang mục sửa màu
            previewImage.src = originalImageDataUrl;
            cameraView.style.display = 'none';
            previewView.style.display = 'flex';
            
            selectFilter('shinkai-vibes'); // Mặc định hiển thị một màu anime xịn nhất
        }

        function cancelPreview() {
            previewView.style.display = 'none';
            cameraView.style.display = 'flex';
        }

        // ÉP CHẶT BỘ LỌC VÀ LỚP GRADIENT VÀO FILE ẢNH VÀ TẢI XUỐNG
        function downloadFinalImage() {
            loadingToast.style.display = 'block';
            
            const imgElement = new Image();
            imgElement.src = originalImageDataUrl;
            
            imgElement.onload = function() {
                const ctx = canvas.getContext('2d');
                canvas.width = imgElement.width;
                canvas.height = imgElement.height;
                
                const currentFilter = filtersConfig.find(f => f.id === selectedFilterId);
                
                // Cấu hình filter đồ họa canvas trùng khớp filter CSS
                ctx.filter = currentFilter.filterCSS;
                ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
                
                // Chèn thêm lớp Gradient nếu bộ lọc có dùng
                if(currentFilter.gradStyle) {
                    ctx.globalCompositeOperation = currentFilter.blend === 'none' ? 'source-over' : currentFilter.blend;
                    let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    
                    // Logic xác định loại gradient dựa theo ID bộ lọc
                    if(currentFilter.id === 'sky-pro') {
                        gradient = ctx.createLinearGradient(0, canvas.height, 0, 0);
                        gradient.addColorStop(0, "rgba(135,206,235,0.1)"); gradient.addColorStop(1, "transparent");
                    } else if(currentFilter.id === 'shinkai-vibes') {
                        gradient.addColorStop(0, "rgba(255,200,220,0.15)"); gradient.addColorStop(1, "rgba(135,206,255,0.1)");
                    } else if(currentFilter.id === 'peach-anime') {
                        gradient.addColorStop(0, "rgba(255,182,193,0.12)"); gradient.addColorStop(1, "rgba(255,225,200,0.08)");
                    } else if(currentFilter.id === 'dreamy-pink') {
                        gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                        gradient.addColorStop(0, "rgba(255,182,193,0.15)"); gradient.addColorStop(1, "rgba(255,200,230,0.1)");
                    } else if(currentFilter.id === 'cyan-orange') {
                        gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                        gradient.addColorStop(0, "rgba(0,128,128,0.12)"); gradient.addColorStop(1, "rgba(255,165,0,0.05)");
                    } // ...Thêm các logic gradient khác nếu cần thiết
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                
                // Reset lại Canvas
                ctx.globalCompositeOperation = 'source-over'; ctx.filter = "none";
                
                canvas.toBlob(function(blob) {
                    const fileUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = fileUrl; link.download = `Sopcare_Anime_${new Date().getTime()}.png`;
                    document.body.appendChild(link); link.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(link); URL.revokeObjectURL(fileUrl);
                        loadingToast.style.display = 'none';
                    }, 500);
                }, 'image/png', 1.0);
            };
        }

        window.addEventListener('DOMContentLoaded', () => { initCam(); renderFilterBar(); });
    </script>
</body>
</html>
