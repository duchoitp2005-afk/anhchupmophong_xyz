<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Chi Tiêu Nhóm 9 - Loại Trừ</title>
    <style>
        body { font-family: sans-serif; background-color: #0d1117; color: white; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: #161b22; padding: 15px; border-radius: 10px; border: 1px solid #30363d; }
        input, select { width: 90%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; }
        button { width: 95%; padding: 12px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; margin: 10px 0; cursor: pointer; }
        .member-select { text-align: left; background: #0d1117; padding: 10px; border-radius: 8px; margin: 10px 0; display: grid; grid-template-columns: 1fr 1fr; }
        .member-select label { font-size: 14px; margin: 5px 0; display: flex; align-items: center; }
        .summary { background: #21262d; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #58a6ff; text-align: left; }
        .history { text-align: left; margin-top: 20px; font-size: 13px; max-height: 200px; overflow-y: auto; background: #0d1117; padding: 10px; border-radius: 5px; }
        .item { border-bottom: 1px solid #30363d; padding: 8px 0; font-size: 12px; }
        .debt-list { margin-top: 10px; color: #ff7b72; font-size: 14px; }
    </style>
</head>
<body>
    <h3>CHI TIÊU NHÓM 9 NGƯỜI</h3>
    <div class="container">
        <input type="text" id="desc" placeholder="Mua món gì?">
        <input type="number" id="money" placeholder="Số tiền (VNĐ)">
        <select id="payer"><option id="p-opt"></option></select>
        
        <p style="font-size: 12px; color: #8b949e; margin-bottom: 5px;">Ai cùng tham gia món này? (Tích chọn)</p>
        <div class="member-select" id="checkbox-list"></div>
        
        <button onclick="addEntry()">GHI VÀO SỔ</button>

        <div class="summary">
            <div id="status">Chưa có dữ liệu</div>
            <div id="debtResult" class="debt-list"></div>
        </div>

        <div class="history" id="historyList"></div>
        <button onclick="clearData()" style="background: #da3633; width: auto; font-size: 12px;">XÓA HẾT</button>
    </div>

    <script>
        const members = ["Hội", "La Huệ", "Phạm Huệ", "Huy Hoàng", "Thân Hiển", "Hiếu", "Huy PG", "Đình Huy", "Đắc Huy"];
        let data = JSON.parse(localStorage.getItem('group9_smart_data')) || [];

        function init() {
            const cbList = document.getElementById('checkbox-list');
            const payerSelect = document.getElementById('payer');
            payerSelect.innerHTML = members.map(m => `<option value="${m}">${m} chi tiền</option>`).join('');
            cbList.innerHTML = members.map(m => `<label><input type="checkbox" class="participant" value="${m}" checked> ${m}</label>`).join('');
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('historyList');
            const debtResult = document.getElementById('debtResult');
            list.innerHTML = "";
            let totals = {}; let shares = {};
            members.forEach(m => { totals[m] = 0; shares[m] = 0; });

            data.forEach((item) => {
                totals[item.payer] += item.price;
                let perPerson = item.price / item.who.length;
                item.who.forEach(m => shares[m] += perPerson);
                list.innerHTML += `<div class="item"><b>${item.payer}</b> chi ${item.price.toLocaleString()}đ cho: ${item.who.join(', ')}</div>`;
            });

            let debtHTML = "<b>Số tiền thực tế (Chi - Phải đóng):</b><br>";
            members.forEach(m => {
                let diff = totals[m] - shares[m];
                if (diff > 0) debtHTML += `<div>• ${m}: Nhận lại <b>${Math.round(diff).toLocaleString()}đ</b></div>`;
                else if (diff < 0) debtHTML += `<div>• ${m}: Đóng thêm <b>${Math.round(Math.abs(diff)).toLocaleString()}đ</b></div>`;
            });
            debtResult.innerHTML = data.length > 0 ? debtHTML : "";
            localStorage.setItem('group9_smart_data', JSON.stringify(data));
        }

        function addEntry() {
            const desc = document.getElementById('desc').value;
            const money = parseInt(document.getElementById('money').value);
            const payer = document.getElementById('payer').value;
            const selected = Array.from(document.querySelectorAll('.participant:checked')).map(cb => cb.value);

            if (desc && money > 0 && selected.length > 0) {
                data.push({ desc, price: money, payer, who: selected });
                document.getElementById('desc').value = ""; document.getElementById('money').value = "";
                updateUI();
            } else { alert("Nhập đủ tiền và chọn ít nhất 1 người ăn nhé!"); }
        }

        function clearData() { if(confirm("Xóa sạch sổ?")) { data = []; updateUI(); } }
        init();
    </script>
</body>
</html>
