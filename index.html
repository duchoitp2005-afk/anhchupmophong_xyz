<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopcare - Camera Đa Bố Cục</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Lớp nền chứa các đường căn bố cục */
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        .active { display: block; }

        /* Màu chung cho đường kẻ căn chỉnh */
        .line { position: absolute; background-color: rgba(255, 255, 255, 0.5); box-shadow: 0 0 3px rgba(0,0,0,0.6); }

        /* 1. BỐ CỤC 1/3 (Rule of Thirds) */
        .grid-v1, .grid-v2 { width: 1px; height: 100%; top: 0; }
        .grid-v1 { left: 33.33%; } .grid-v2 { left: 66.66%; }
        .grid-h1, .grid-h2 { height: 1px; width: 100%; left: 0; }
        .grid-h1 { top: 33.33%; } .grid-h2 { top: 66.66%; }

        /* 2. BỐ CỤC KHUNG TRONG KHUNG (Framing) */
        .frame-box { position: absolute; top: 15%; left: 10%; width: 80%; height: 55%; border: 2px solid rgba(255, 255, 255, 0.6); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .frame-focus { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 100px; border: 1.5px dashed #ffeb3b; }

        /* 3. BỐ CỤC TAM GIÁC (Triangle) */
        .triangle-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 4. BỐ CỤC TRUNG TÂM / ĐƯỜNG DẪN DỌC */
        .center-v1, .center-v2 { width: 2px; height: 100%; top: 0; background-color: rgba(255, 255, 255, 0.6); }
        .center-v1 { left: 45%; } .center-v2 { left: 55%; }

        /* Thanh Thước Thủy Chống Nghiêng */
        .leveler { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 140px; height: 6px; background: rgba(255, 255, 255, 0.2); border-radius: 3px; }
        .leveler-bar { width: 30px; height: 100%; background: #4caf50; border-radius: 3px; margin: 0 auto; transform: translateX(0px); transition: transform 0.05s linear; }

        /* Giao diện thanh điều khiển phía dưới */
        .controls-panel { position: absolute; bottom: 0; width: 100%; height: 110px; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding-bottom: 10px; }
        
        /* Menu bấm chuyển đổi bố cục */
        .mode-selector { width: 100%; display: flex; justify-content: center; gap: 8px; overflow-x: auto; padding: 5px 10px; }
        .mode-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .mode-btn.selected { background: #ffeb3b; color: #000; font-weight: bold; }

        /* Nút chụp ảnh */
        .shutter-btn { width: 55px; height: 55px; border-radius: 50%; background-color: #fff; border: 4px solid rgba(255, 255, 255, 0.3); cursor: pointer; }
    </style>
</head>
<body>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>

        <div id="layout-thirds" class="overlay-layer active">
            <div class="line grid-v1"></div><div class="line grid-v2"></div>
            <div class="line grid-h1"></div><div class="line grid-h2"></div>
        </div>

        <div id="layout-framing" class="overlay-layer">
            <div class="frame-box"></div>
            <div class="frame-focus"></div>
        </div>

        <div id="layout-triangle" class="overlay-layer">
            <svg class="triangle-svg">
                <line x1="0" y1="50%" x2="100%" y2="50%" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
                <polygon points="50%,15% 0%,50% 100%,50%" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
            </svg>
        </div>

        <div id="layout-center" class="overlay-layer">
            <div class="line center-v1"></div><div class="line center-v2"></div>
            <line x1="0" y1="55%" x2="100%" y2="55%" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
        </div>

        <div class="leveler"><div id="levelerBar" class="leveler-bar"></div></div>

        <div class="controls-panel">
            <div class="mode-selector">
                <button class="mode-btn selected" onclick="changeLayout('thirds', this)">Bố cục 1/3</button>
                <button class="mode-btn" onclick="changeLayout('framing', this)">Khung hình</button>
                <button class="mode-btn" onclick="changeLayout('triangle', this)">Tam giác</button>
                <button class="mode-btn" onclick="changeLayout('center', this)">Trung tâm</button>
            </div>
            <button class="shutter-btn" onclick="takePick()"></button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const levelerBar = document.getElementById('levelerBar');

        // Mở camera sau của điện thoại
        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" } }, audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                    .then(stream => { video.srcObject = stream; });
            }
        }

        // Hàm bấm chuyển đổi qua lại giữa các loại bố cục hình ảnh
        function changeLayout(layoutName, btnElement) {
            document.querySelectorAll('.overlay-layer').forEach(layer => layer.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
            
            document.getElementById(`layout-${layoutName}`).classList.add('active');
            btnElement.classList.add('selected');
        }

        // Cảm biến chống nghiêng điện thoại khi chụp
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                let roll = e.gamma;
                if (roll !== null) {
                    if (roll > 25) roll = 25; if (roll < -25) roll = -25;
                    let moveX = (roll / 25) * 50;
                    levelerBar.style.transform = `translateX(${moveX}px)`;
                    levelerBar.style.background = Math.abs(roll) < 1.5 ? "#ffeb3b" : "#4caf50";
                }
            });
        }

        function takePick() { alert("Căn bố cục chuẩn rồi! Tách!"); }
        window.addEventListener('DOMContentLoaded', initCam);
    </script>
</body>
</html>
